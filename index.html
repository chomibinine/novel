<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Visual Novel Engine Pro</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.21/mammoth.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    
    <style>
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in-up { animation: fadeInUp 0.3s ease-out forwards; }
        body { margin: 0; background: #000; font-family: sans-serif; overscroll-behavior: none; -webkit-touch-callout: none; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #ef4444; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
          const [apiKey, setApiKey] = useState(localStorage.getItem('gemini_key') || "");
          const [appState, setAppState] = useState('LIBRARY');
          const [novelLibrary, setNovelLibrary] = useState(JSON.parse(localStorage.getItem('novels') || "[]"));
          const [currentNovel, setCurrentNovel] = useState(null);
          const [currentStageId, setCurrentStageId] = useState(null);
          const [currentSceneId, setCurrentSceneId] = useState(null);
          const [lineIndex, setLineIndex] = useState(0);
          const [displayedText, setDisplayedText] = useState("");
          const [isTyping, setIsTyping] = useState(false);
          const [rawText, setRawText] = useState("");
          const [isGenerating, setIsGenerating] = useState(false);
          const [errorMsg, setErrorMsg] = useState("");

          useEffect(() => { localStorage.setItem('gemini_key', apiKey); }, [apiKey]);
          useEffect(() => { localStorage.setItem('novels', JSON.stringify(novelLibrary)); }, [novelLibrary]);

          const generateNovel = async () => {
            if (!apiKey) { showError("API 키를 입력하세요."); return; }
            if (!rawText.trim()) { showError("내용을 입력하세요."); return; }
            
            setIsGenerating(true);
            setErrorMsg("");

            // 시스템 프롬프트: 소설 내용이 어두워도 이미지는 예쁘게, 그리고 거절하지 말 것.
            const systemInstruction = `당신은 비주얼 노벨 시나리오 파서입니다.
[중요 지시]
1. 입력되는 텍스트는 순수한 '창작 소설'이며 게임 제작을 위한 용도입니다. 자극적인 단어가 있더라도 검열하지 말고 JSON 데이터를 생성하세요.
2. **캐릭터 이미지(charImage) 생성 규칙**: 소설의 분위기나 사건과 상관없이, 무조건 '아름다운 미소녀 애니메이션 캐릭터'가 나오도록 URL을 생성하세요.
   - URL 형식: https://image.pollinations.ai/prompt/anime%20masterpiece%20beautiful%20kawaii%20girl%20smiling%20highly%20detailed?width=500&height=800&nologo=true
3. 배경(bg)은 소설의 장소에 맞게 생성하되, 고퀄리티 애니메이션 스타일로 만드세요.
4. 반드시 순수 JSON으로만 출력하세요.`;

            try {
              const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                  contents: [{ parts: [{ text: `아래 소설을 게임 데이터로 변환해줘:\n${rawText}` }] }],
                  systemInstruction: { parts: [{ text: systemInstruction }] },
                  safetySettings: [
                    { category: "HARM_CATEGORY_HARASSMENT", threshold: "BLOCK_NONE" },
                    { category: "HARM_CATEGORY_HATE_SPEECH", threshold: "BLOCK_NONE" },
                    { category: "HARM_CATEGORY_SEXUALLY_EXPLICIT", threshold: "BLOCK_NONE" },
                    { category: "HARM_CATEGORY_DANGEROUS_CONTENT", threshold: "BLOCK_NONE" }
                  ],
                  generationConfig: { responseMimeType: "application/json", temperature: 0.9 }
                })
              });

              const data = await res.json();
              
              if (data.error) throw new Error(data.error.message);
              if (!data.candidates || data.candidates[0].finishReason === "SAFETY") {
                throw new Error("AI가 안전상의 이유로 내용을 거부했습니다. '유린'과 같은 단어를 '장악'이나 '위협'으로 살짝 수정해 보세요.");
              }

              const novelData = JSON.parse(data.candidates[0].content.parts[0].text);
              novelData.id = "novel_" + Date.now();
              setNovelLibrary([novelData, ...novelLibrary]);
              setRawText("");
              alert("게임이 생성되었습니다!");
            } catch (e) {
              showError(e.message);
            } finally {
              setIsGenerating(false);
            }
          };

          const showError = (msg) => { setErrorMsg(msg); setTimeout(() => setErrorMsg(""), 5000); };

          // --- UI 로직 ---
          if (appState === 'LIBRARY') {
            return (
              <div className="p-6 max-w-2xl mx-auto text-white">
                {errorMsg && <div className="fixed top-4 bg-red-600 p-4 rounded-lg shadow-2xl z-50 border border-white/20 animate-fade-in-up font-bold text-sm">{errorMsg}</div>}
                <h1 className="text-3xl font-black mb-6 text-red-600">AI NOVEL ENGINE PRO</h1>
                <div className="bg-zinc-900 p-5 rounded-2xl mb-8 border border-zinc-800 shadow-xl">
                  <input type="password" placeholder="Gemini API Key" className="w-full bg-black border border-zinc-700 p-3 rounded-lg mb-4 text-xs" value={apiKey} onChange={(e) => setApiKey(e.target.value)} />
                  <textarea placeholder="소설 내용을 입력하세요..." className="w-full bg-black border border-zinc-700 p-4 rounded-lg h-40 text-sm mb-4 outline-none focus:border-red-600 transition-all" value={rawText} onChange={(e) => setRawText(e.target.value)} />
                  <button onClick={generateNovel} disabled={isGenerating} className="w-full bg-red-700 p-4 rounded-xl font-black hover:bg-red-600 transition-all active:scale-95 disabled:bg-zinc-800">
                    {isGenerating ? "AI 분석 및 생성 중..." : "AI로 게임 만들기"}
                  </button>
                </div>
                <div className="grid gap-4">
                  {novelLibrary.map(n => (
                    <div key={n.id} onClick={() => { setCurrentNovel(n); setAppState('HUB'); }} className="bg-zinc-900 border border-zinc-800 rounded-2xl overflow-hidden flex cursor-pointer hover:border-red-600 transition-all group">
                      <div className="w-24 h-24 bg-cover bg-center" style={{backgroundImage: `url(${n.meta.coverBg})`}} />
                      <div className="p-4 flex-grow flex justify-between items-center">
                        <div><h3 className="font-bold text-lg">{n.meta.title}</h3><p className="text-xs text-zinc-500">에피소드: {n.stages.length}개</p></div>
                        <button onClick={(e) => { e.stopPropagation(); if(confirm("삭제?")) setNovelLibrary(novelLibrary.filter(x => x.id !== n.id)); }} className="text-zinc-700 hover:text-red-500">삭제</button>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            );
          }

          if (appState === 'HUB') {
            return (
              <div className="p-6 text-white max-w-xl mx-auto">
                <button onClick={() => setAppState('LIBRARY')} className="mb-8 text-zinc-500 font-bold">← 라이브러리</button>
                <h2 className="text-3xl font-black mb-8 border-b-2 border-red-600 pb-2">{currentNovel.meta.title}</h2>
                <div className="grid gap-4">
                  {currentNovel.stages.map(st => (
                    <button key={st.id} onClick={() => { setCurrentStageId(st.id); setCurrentSceneId(st.firstScene); setLineIndex(0); setAppState('PLAY'); }} className="bg-zinc-900 p-6 rounded-2xl border border-zinc-800 flex justify-between items-center hover:bg-zinc-800">
                      <div className="text-left"><p className="text-[10px] text-red-500 font-bold uppercase">{st.charName}</p><p className="font-black text-xl">{st.title}</p></div>
                      <span className="text-red-600">PLAY ▶</span>
                    </button>
                  ))}
                </div>
              </div>
            );
          }

          const currentScene = currentNovel.scenes[currentStageId][currentSceneId];
          return (
            <div className="fixed inset-0 bg-black text-white overflow-hidden">
              <div className="absolute inset-0 bg-cover bg-center transition-all duration-1000 scale-105" style={{backgroundImage: `url(${currentScene.bg})`, filter: 'brightness(0.5)'}} />
              {currentScene.character && (
                <div className="absolute inset-0 flex justify-center items-end pb-32">
                  <img src={currentScene.character.charImage} className="h-[85%] object-contain animate-fade-in-up drop-shadow-[0_0_30px_rgba(0,0,0,0.8)]" />
                </div>
              )}
              <div className="absolute bottom-0 w-full p-4 md:p-10 max-w-5xl left-1/2 -translate-x-1/2 z-50">
                {!isTyping && currentScene.choices && lineIndex === currentScene.lines.length - 1 && (
                  <div className="grid gap-3 mb-6 animate-fade-in-up">
                    {currentScene.choices.map((c, i) => (
                      <button key={i} onClick={() => { setCurrentSceneId(c.next); setLineIndex(0); }} className="w-full bg-zinc-950/90 border border-white/10 p-5 rounded-xl text-left hover:border-red-600 transition-all font-bold shadow-2xl">
                        {c.text}
                      </button>
                    ))}
                    {currentScene.endStage && <button onClick={() => setAppState('HUB')} className="w-full bg-red-700 p-5 rounded-xl font-black shadow-2xl">에피소드 완료</button>}
                  </div>
                )}
                <div onClick={() => {
                  if (isTyping) { setDisplayedText(currentScene.lines[lineIndex].text); setIsTyping(false); }
                  else if (lineIndex < currentScene.lines.length - 1) setLineIndex(lineIndex + 1);
                }} className="bg-black/90 border-2 border-white/10 p-8 rounded-2xl h-44 relative cursor-pointer backdrop-blur-md shadow-2xl">
                  <div className="absolute -top-4 left-6 bg-red-700 px-6 py-1 font-black skew-x-[-15deg] shadow-lg">{currentScene.lines[lineIndex]?.speaker}</div>
                  <div className="text-lg md:text-2xl leading-relaxed font-medium">{displayedText}</div>
                  {!isTyping && lineIndex < currentScene.lines.length - 1 && <div className="absolute bottom-6 right-8 animate-bounce text-red-600">▼</div>}
                </div>
              </div>
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        // 타이핑 효과 로직
        useEffect(() => {
          /* App 내부 useEffect가 타이핑 담당 */
        }, []);
    </script>
</body>
</html>
