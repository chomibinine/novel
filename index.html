<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Visual Novel Engine</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.21/mammoth.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    
    <style>
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in-up { animation: fadeInUp 0.3s ease-out forwards; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .animate-spin-slow { animation: spin 2s linear infinite; }

        body { 
          margin: 0; background: #000; font-family: sans-serif; 
          overscroll-behavior: none; -webkit-touch-callout: none;
        }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #111; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #ef4444; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // 아이콘 컴포넌트
        const IconPlay = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>;
        const IconRotate = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><polyline points="3 3 3 8 8 8"/></svg>;
        const IconTrash = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>;

        const App = () => {
          // --- 상태 관리 ---
          const [apiKey, setApiKey] = useState(localStorage.getItem('gemini_key') || "");
          const [appState, setAppState] = useState('LIBRARY');
          const [novelLibrary, setNovelLibrary] = useState(JSON.parse(localStorage.getItem('novels') || "[]"));
          const [currentNovel, setCurrentNovel] = useState(null);
          const [currentStageId, setCurrentStageId] = useState(null);
          const [currentSceneId, setCurrentSceneId] = useState(null);
          const [lineIndex, setLineIndex] = useState(0);
          const [displayedText, setDisplayedText] = useState("");
          const [isTyping, setIsTyping] = useState(false);
          const [rawText, setRawText] = useState("");
          const [isGenerating, setIsGenerating] = useState(false);
          const [errorMsg, setErrorMsg] = useState("");

          // --- 로컬 스토리지 저장 ---
          useEffect(() => {
            localStorage.setItem('gemini_key', apiKey);
          }, [apiKey]);

          useEffect(() => {
            localStorage.setItem('novels', JSON.stringify(novelLibrary));
          }, [novelLibrary]);

          // --- AI 생성 로직 ---
          const generateNovel = async () => {
            if (!apiKey) { showError("API 키를 입력하세요."); return; }
            if (!rawText.trim()) { showError("내용을 입력하세요."); return; }
            
            setIsGenerating(true);
            setErrorMsg("");

            // 예쁜 캐릭터 이미지를 위한 고정 프롬프트
            const beautyPrompt = "masterpiece, best quality, beautiful anime girl, detailed eyes, soft lighting, highres";

            const prompt = `비주얼 노벨 데이터를 생성해줘. 반드시 JSON 형식으로만 응답해.
[중요 규칙]
1. 각 씬의 charImage는 반드시 다음 URL 형식을 사용해:
   https://image.pollinations.ai/prompt/anime%20masterpiece%20high%20quality%20beautiful%20character%20{묘사}?width=500&height=800&nologo=true
   - {묘사} 부분에는 소설 내용과 상관없이 무조건 'beautiful%20girl%20smiling%20high%20quality' 같은 예쁜 캐릭터 묘사를 영문으로 넣어줘.
2. 배경(bg)은 소설 상황에 맞게 Pollinations.ai URL을 생성해줘.
3. JSON 구조:
{
  "id": "novel_unique_id",
  "meta": { "title": "제목", "coverBg": "커버이미지URL", "protagonist": { "name": "주인공", "pov": "1인칭" }, "statsConfig": [] },
  "stages": [{ "id": "st1", "title": "1화", "charName": "캐릭터명", "isUnlocked": true, "firstScene": "sc1", "color": "text-red-500" }],
  "scenes": { "st1": { "sc1": { "bg": "배경URL", "character": { "name": "캐릭터명", "charImage": "캐릭터URL" }, "lines": [{ "speaker": "이름", "text": "대사" }], "choices": [{ "text": "선택지", "next": "다음씬ID" }] } } }
}`;

            try {
              const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                  contents: [{ parts: [{ text: rawText + "\n\n" + prompt }] }],
                  safetySettings: [
                    { category: "HARM_CATEGORY_HARASSMENT", threshold: "BLOCK_NONE" },
                    { category: "HARM_CATEGORY_HATE_SPEECH", threshold: "BLOCK_NONE" },
                    { category: "HARM_CATEGORY_SEXUALLY_EXPLICIT", threshold: "BLOCK_NONE" },
                    { category: "HARM_CATEGORY_DANGEROUS_CONTENT", threshold: "BLOCK_NONE" }
                  ],
                  generationConfig: { responseMimeType: "application/json" }
                })
              });

              const data = await res.json();
              if (!data.candidates) throw new Error("AI가 응답을 거부했습니다. 내용을 수정해 보세요.");
              
              const novelData = JSON.parse(data.candidates[0].content.parts[0].text);
              novelData.id = "novel_" + Date.now();
              setNovelLibrary([novelData, ...novelLibrary]);
              setRawText("");
              alert("성공적으로 생성되었습니다!");
            } catch (e) {
              showError("생성 실패: " + e.message);
            } finally {
              setIsGenerating(false);
            }
          };

          const showError = (msg) => { setErrorMsg(msg); setTimeout(() => setErrorMsg(""), 4000); };

          const deleteNovel = (e, id) => {
            e.stopPropagation();
            if(confirm("삭제하시겠습니까?")) setNovelLibrary(novelLibrary.filter(n => n.id !== id));
          };

          // --- 게임 플레이 로직 ---
          const playScene = (scene) => {
            const line = scene.lines[lineIndex];
            if (!line) return;
            setIsTyping(true); setDisplayedText("");
            let i = 0;
            const timer = setInterval(() => {
              if (i < line.text.length) { setDisplayedText(line.text.substring(0, i + 1)); i++; }
              else { clearInterval(timer); setIsTyping(false); }
            }, 30);
            return () => clearInterval(timer);
          };

          useEffect(() => {
            if (appState === 'PLAY' && currentNovel) {
              const scene = currentNovel.scenes[currentStageId][currentSceneId];
              playScene(scene);
            }
          }, [currentSceneId, lineIndex, appState]);

          const handleNext = () => {
            if (isTyping) {
              setDisplayedText(currentNovel.scenes[currentStageId][currentSceneId].lines[lineIndex].text);
              setIsTyping(false);
              return;
            }
            const scene = currentNovel.scenes[currentStageId][currentSceneId];
            if (lineIndex < scene.lines.length - 1) setLineIndex(lineIndex + 1);
            else if (scene.nextScene) { setCurrentSceneId(scene.nextScene); setLineIndex(0); }
          };

          // --- 화면 렌더링 ---
          if (appState === 'LIBRARY') {
            return (
              <div className="p-6 max-w-2xl mx-auto text-white">
                {errorMsg && <div className="fixed top-4 bg-red-600 p-3 rounded shadow-lg z-50">{errorMsg}</div>}
                <h1 className="text-3xl font-black mb-6 text-red-600 tracking-tighter">AI NOVEL ENGINE</h1>
                
                <div className="bg-zinc-900 p-4 rounded-xl mb-8 border border-zinc-800">
                  <input 
                    type="password" 
                    placeholder="Gemini API Key를 입력하세요" 
                    className="w-full bg-black border border-zinc-700 p-3 rounded mb-4 text-sm"
                    value={apiKey}
                    onChange={(e) => setApiKey(e.target.value)}
                  />
                  <textarea 
                    placeholder="소설 내용을 입력하세요..." 
                    className="w-full bg-black border border-zinc-700 p-3 rounded h-32 text-sm mb-4"
                    value={rawText}
                    onChange={(e) => setRawText(e.target.value)}
                  />
                  <button 
                    onClick={generateNovel}
                    disabled={isGenerating}
                    className="w-full bg-red-700 p-3 rounded font-bold hover:bg-red-600 disabled:bg-zinc-700"
                  >
                    {isGenerating ? "생성 중..." : "AI로 게임 만들기"}
                  </button>
                </div>

                <div className="grid gap-4">
                  {novelLibrary.map(n => (
                    <div key={n.id} onClick={() => { setCurrentNovel(n); setAppState('HUB'); }} className="bg-zinc-900 border border-zinc-800 rounded-xl overflow-hidden flex cursor-pointer group">
                      <div className="w-24 h-24 bg-cover" style={{backgroundImage: `url(${n.meta.coverBg})`}} />
                      <div className="p-4 flex-grow flex justify-between items-center">
                        <div>
                          <h3 className="font-bold text-lg">{n.meta.title}</h3>
                          <p className="text-xs text-zinc-500">에피소드: {n.stages.length}개</p>
                        </div>
                        <button onClick={(e) => deleteNovel(e, n.id)} className="text-zinc-600 hover:text-red-500 transition-colors"><IconTrash/></button>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            );
          }

          if (appState === 'HUB') {
            return (
              <div className="p-6 text-white max-w-xl mx-auto">
                <button onClick={() => setAppState('LIBRARY')} className="mb-6 flex items-center gap-2 text-zinc-400"><IconRotate/> 라이브러리</button>
                <h2 className="text-2xl font-black mb-8">{currentNovel.meta.title}</h2>
                <div className="grid gap-3">
                  {currentNovel.stages.map(st => (
                    <button key={st.id} onClick={() => { setCurrentStageId(st.id); setCurrentSceneId(st.firstScene); setLineIndex(0); setAppState('PLAY'); }} className="bg-zinc-900 p-5 rounded-xl border border-zinc-800 flex justify-between items-center group">
                      <span className="font-bold">{st.title}</span>
                      <IconPlay />
                    </button>
                  ))}
                </div>
              </div>
            );
          }

          const currentScene = currentNovel.scenes[currentStageId][currentSceneId];
          return (
            <div className="fixed inset-0 bg-black text-white overflow-hidden">
              <div className="absolute inset-0 bg-cover bg-center transition-all duration-1000" style={{backgroundImage: `url(${currentScene.bg})`, filter: 'brightness(0.6)'}} />
              
              {currentScene.character && (
                <div className="absolute inset-0 flex justify-center items-end pb-32">
                  <img src={currentScene.character.charImage} className="h-4/5 object-contain animate-fade-in-up shadow-2xl" />
                </div>
              )}

              <div className="absolute bottom-0 w-full p-4 md:p-8 max-w-4xl left-1/2 -translate-x-1/2">
                {!isTyping && currentScene.choices && lineIndex === currentScene.lines.length - 1 && (
                  <div className="grid gap-2 mb-4">
                    {currentScene.choices.map((c, i) => (
                      <button key={i} onClick={() => { setCurrentSceneId(c.next); setLineIndex(0); }} className="w-full bg-zinc-900/90 border border-red-900/50 p-4 rounded-lg text-left hover:bg-red-900/40 transition-all font-bold">
                        {c.text}
                      </button>
                    ))}
                    {currentScene.endStage && <button onClick={() => setAppState('HUB')} className="w-full bg-red-700 p-4 rounded-lg font-black">에피소드 종료</button>}
                  </div>
                )}
                
                <div onClick={handleNext} className="bg-black/80 border-2 border-zinc-800 p-6 rounded-lg h-40 relative cursor-pointer">
                  <div className="absolute -top-4 left-4 bg-red-700 px-4 py-1 font-black skew-x-[-10deg]">{currentScene.lines[lineIndex]?.speaker}</div>
                  <div className="text-lg leading-relaxed">{displayedText}</div>
                  {!isTyping && lineIndex < currentScene.lines.length - 1 && <div className="absolute bottom-4 right-4 animate-bounce text-red-500">▼</div>}
                </div>
              </div>
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
