    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    
    <style>
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in-up { animation: fadeInUp 0.3s ease-out forwards; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .animate-spin-slow { animation: spin 2s linear infinite; }
        @keyframes pulse-slow { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .animate-pulse-slow { animation: pulse-slow 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }

        body { 
          margin: 0; background: #000; font-family: 'Pretendard', -apple-system, sans-serif; 
          overscroll-behavior: none; -webkit-touch-callout: none;
        }
        
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #18181b; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #dc2626; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background-color: #b91c1c; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-presets="env,react">
        const { useState, useEffect, useRef } = React;

        // ==========================================
        // [에러 블랙박스] 앱이 뻗으면 원인을 화면에 띄움
        // ==========================================
        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, errorInfo: null };
            }
            static getDerivedStateFromError(error) {
                return { hasError: true, errorInfo: error.toString() };
            }
            render() {
                if (this.state.hasError) {
                    return (
                        <div className="p-6 text-red-500 bg-black h-screen font-mono text-sm break-all overflow-y-auto">
                            <h2 className="text-xl font-bold mb-4 border-b border-red-800 pb-2">CRITICAL ERROR (앱 충돌)</h2>
                            <p className="text-zinc-300 mb-4">아래 에러 메시지를 복사해서 알려주시면 즉시 해결해 드리겠습니다.</p>
                            <p className="bg-red-950/50 p-4 rounded">{this.state.errorInfo}</p>
                        </div>
                    );
                }
                return this.props.children;
            }
        }
