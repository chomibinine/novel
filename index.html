<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Visual Novel Engine v2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { margin: 0; background: #000; font-family: sans-serif; overflow: hidden; color: white; }
        #root { min-height: 100vh; background: #0a0a0a; }
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [state, setState] = useState('INIT'); // INIT, PLAY, ERROR
            const [apiKey, setApiKey] = useState(() => localStorage.getItem('gemini_api_key') || '');
            const [rawText, setRawText] = useState("어두운 밤, 비가 내리는 골목길. 누군가 나를 쫓아온다.");
            const [loading, setLoading] = useState(false);
            const [novel, setNovel] = useState(null);
            const [sceneId, setSceneId] = useState('');
            const [lineIdx, setLineIdx] = useState(0);

            useEffect(() => { localStorage.setItem('gemini_api_key', apiKey); }, [apiKey]);

            const generateGame = async () => {
                if (!apiKey) return alert("API 키를 입력해주세요!");
                setLoading(true);
                
                const prompt = `비주얼 노벨 JSON 데이터 생성기. 마크다운 없이 순수 JSON만 출력. 
                구조: {"title":"제목", "scenes":{"scene1":{"bg":"영단어 묘사","char":"영단어 묘사","lines":[{"speaker":"이름","text":"대사"}],"next":"scene2"}}}
                마지막 씬은 "next":null 로 설정.`;

                try {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: rawText }] }],
                            systemInstruction: { parts: [{ text: prompt }] },
                            generationConfig: { responseMimeType: "application/json" }
                        })
                    });

                    if (!res.ok) throw new Error(`HTTP ${res.status}`);

                    const data = await res.json();
                    
                    // [해결] candidates[0] 에러 방어 로직
                    const content = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    if (!content) throw new Error("AI가 답변을 거부했습니다. (안전 필터 또는 할당량 초과)");

                    const parsed = JSON.parse(content);
                    setNovel(parsed);
                    setSceneId(Object.keys(parsed.scenes)[0]);
                    setLineIdx(0);
                    setState('PLAY');
                } catch (err) {
                    console.error(err);
                    alert("오류: " + err.message);
                } finally {
                    setLoading(false);
                }
            };

            if (state === 'INIT') {
                return (
                    <div className="p-8 max-w-lg mx-auto flex flex-col gap-6 fade-in">
                        <h1 className="text-3xl font-black text-red-600 tracking-tighter">AI NOVEL ENGINE</h1>
                        <div>
                            <label className="text-xs font-bold text-zinc-500 uppercase">Gemini API Key</label>
                            <input type="password" value={apiKey} onChange={e => setApiKey(e.target.value)} className="w-full bg-zinc-900 border border-zinc-800 p-4 rounded-lg mt-1 outline-none focus:border-red-600 transition-all" placeholder="AIzaSy..."/>
                        </div>
                        <div className="bg-zinc-900 p-6 rounded-2xl border border-zinc-800">
                            <textarea value={rawText} onChange={e => setRawText(e.target.value)} className="w-full h-48 bg-transparent outline-none resize-none text-lg leading-relaxed" placeholder="소설 내용을 입력하세요..."/>
                            <button onClick={generateGame} disabled={loading} className="w-full py-4 bg-red-700 hover:bg-red-600 disabled:bg-zinc-800 font-bold rounded-xl mt-4 transition-all">
                                {loading ? "AI가 세계관 구성 중..." : "게임 시작하기"}
                            </button>
                        </div>
                    </div>
                );
            }

            const currentScene = novel?.scenes[sceneId];
            if (!currentScene) return <div className="p-10 text-center">데이터 오류 <button onClick={()=>setState('INIT')}>돌아가기</button></div>;

            const bgUrl = `https://image.pollinations.ai/prompt/anime%20visual%20novel%20background%20${encodeURIComponent(currentScene.bg)}?width=720&height=1280&nologo=true`;
            const charUrl = `https://image.pollinations.ai/prompt/anime%20visual%20novel%20character%20portrait%20${encodeURIComponent(currentScene.char)}?width=720&height=1280&nologo=true`;

            return (
                <div className="fixed inset-0 bg-black flex flex-col fade-in" onClick={() => {
                    if (lineIdx < currentScene.lines.length - 1) {
                        setLineIdx(lineIdx + 1);
                    } else if (currentScene.next && novel.scenes[currentScene.next]) {
                        setSceneId(currentScene.next);
                        setLineIdx(0);
                    } else {
                        if(confirm("엔딩입니다. 처음으로 돌아갈까요?")) setState('INIT');
                    }
                }}>
                    {/* 배경 */}
                    <div className="absolute inset-0 bg-cover bg-center transition-all duration-700" style={{ backgroundImage: `url('${bgUrl}')` }}>
                        <div className="absolute inset-0 bg-black/40" />
                    </div>

                    {/* 캐릭터 */}
                    <div className="absolute inset-0 flex justify-center items-end">
                        <img key={sceneId} src={charUrl} className="h-[85%] object-contain fade-in" />
                    </div>

                    {/* 대화창 */}
                    <div className="mt-auto relative p-8 bg-black/80 border-t-4 border-red-900/50 backdrop-blur-md min-h-[30%]">
                        <div className="text-red-500 font-black text-xl mb-3 tracking-tighter">
                            {currentScene.lines[lineIdx]?.speaker}
                        </div>
                        <div className="text-2xl leading-snug font-medium break-keep">
                            {currentScene.lines[lineIdx]?.text}
                        </div>
                        <div className="absolute bottom-4 right-8 animate-bounce text-red-600">▼</div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
