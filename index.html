<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Visual Novel Engine - Universal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @keyframes fadeInUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
        @keyframes blink    { 0%,100%{opacity:1} 50%{opacity:0} }
        body { margin:0; background:#000; font-family:'Pretendard', -apple-system, sans-serif; overscroll-behavior:none; -webkit-user-select:none; user-select:none; overflow: hidden; }
        .animate-fade-in-up { animation:fadeInUp 0.5s ease-out forwards; }
        .cursor-blink { animation:blink 0.8s step-end infinite; }
        .custom-scrollbar::-webkit-scrollbar { width:4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background:#18181b; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background:#dc2626; border-radius:4px; }
        .dialog-outer { position: absolute; bottom: 0; left: 0; right: 0; z-index: 50; padding: 0 12px 16px 12px; }
        .dialog-inner { background: rgba(5,5,5,0.93); border: 2px solid rgba(255,255,255,0.14); border-radius: 18px; backdrop-filter: blur(14px); box-shadow: 0 0 60px rgba(0,0,0,0.85); overflow: hidden; }
        .dialog-text { height: 110px; overflow-y: auto; padding: 8px 20px 4px 20px; cursor: pointer; }
        @media(min-width:768px){ .dialog-text{ height:130px; } }
        .speaker-badge { display: inline-block; background: #dc2626; color: #fff; font-size: 13px; font-weight: 900; padding: 5px 22px 5px 14px; margin: 10px 0 0 14px; clip-path: polygon(0 0, calc(100% - 9px) 0, 100% 50%, calc(100% - 9px) 100%, 0 100%); }
        .choice-btn { width:100%; padding:13px 18px; background:rgba(8,8,8,0.88); border:1px solid rgba(255,255,255,0.12); border-radius:10px; color:#e4e4e7; font-size:14px; font-weight:700; text-align:left; display:flex; align-items:center; justify-content:space-between; cursor:pointer; margin-bottom:8px; transition: all 0.2s; }
        .choice-btn:hover:not(:disabled) { border-color:#dc2626; background:rgba(220,38,38,0.09); padding-left:22px; }
        .choice-btn:disabled { opacity: 0.4; cursor: not-allowed; filter: grayscale(1); }
        .text-shimmer { background:linear-gradient(90deg,#ef4444,#fca5a5,#ef4444); background-size:200% auto; -webkit-background-clip:text; -webkit-text-fill-color:transparent; animation:shimmer 2s linear infinite; }
        @keyframes shimmer { 0%{background-position:-200% center} 100%{background-position:200% center} }
    </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

const IcoChevron = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M9 18l6-6-6-6"/></svg>;
const IcoZap = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>;

/* ══════════════════════════════════════
   🔥 범용 오토-캐스팅 시스템 (이름만 쓰면 자동 생성)
══════════════════════════════════════ */

// 1. 이름 글자를 고유 숫자로 변환하는 해시 함수 (얼굴 고정용)
const getSeedFromName = (name) => {
    let hash = 0;
    for (let i = 0; i < name.length; i++) {
        hash = (hash << 5) - hash + name.charCodeAt(i);
    }
    return Math.abs(hash);
};

// 2. 미리 정의해둔 특정 캐릭터들 (특별 대우)
const PRESET_PROMPTS = {
    "초미": "masterpiece, high quality, highly detailed, beautiful anime high school girl, long black hair, school uniform, no glasses, detailed face",
    "비니": "masterpiece, high quality, highly detailed, cute anime middle school boy, short brown hair, casual outfit, detailed face"
};

const EMOTION_PROMPTS = {
    neutral: "calm expression",
    happy: "smiling brightly, cheerful",
    sad: "teary eyes, sad expression",
    angry: "angry, frowning",
    shy: "blushing, looking away",
    bold: "confident smirk, energetic"
};

// 3. 모르는 이름이 들어와도 알아서 캐릭터를 생성하도록 수정
const getCharacterUrl = (speakerName, emotion = "neutral") => {
    if (emotion === "exit") return null;
    
    // 미리 정의된 캐릭터면 그 설정을 쓰고, 없으면 범용 고퀄리티 애니메이션 프롬프트 적용
    const basePrompt = PRESET_PROMPTS[speakerName] || "masterpiece, high quality, highly detailed, beautiful anime character, solo, detailed face, vibrant colors";
    const emoPrompt = EMOTION_PROMPTS[emotion] || EMOTION_PROMPTS.neutral;
    const finalPrompt = `${basePrompt}, ${emoPrompt}`;
    
    // 이름에서 영구적인 고유 시드를 뽑아냄 (누가 써도 '철수'는 항상 같은 얼굴로 나옴)
    const seed = PRESET_PROMPTS[speakerName] ? (speakerName === "초미" ? 777 : 888) : getSeedFromName(speakerName);
    
    return `https://image.pollinations.ai/prompt/${encodeURIComponent(finalPrompt)}?width=350&height=550&nologo=true&seed=${seed}`;
};

const getBgUrl = (seed) => {
    const bgPrompt = "masterpiece, high quality, beautiful anime visual novel background, cinematic lighting";
    return `https://image.pollinations.ai/prompt/${encodeURIComponent(bgPrompt)}?width=1280&height=720&nologo=true&seed=${seed}`;
};

const preloadImage = (src, timeout = 5000) => {
    if (!src) return Promise.resolve(null);
    return new Promise(res => {
        const img = new Image();
        let done = false;
        const finish = (finalSrc) => { if (!done) { done = true; res(finalSrc); } };
        img.onload = () => finish(src);
        img.onerror = () => { finish(`https://image.pollinations.ai/prompt/anime%20silhouette?width=350&height=550&nologo=true`); };
        img.src = src;
        setTimeout(() => finish(src), timeout);
    });
};

/* ══════════════════════════════════════
   🔥 파서 로직
══════════════════════════════════════ */
function parseNovel(rawText, title="") {
    const lines = rawText.split('\n').map(l=>l.trim()).filter(l=>l.length>2);
    const dlines = lines.map(line => {
        const m = line.match(/^([^|:：]{1,12})(?:\|([^|:：]+))?(?:\|([^:：]+))?[：:]\s*(.+)$/);
        if (m) {
            return {
                speaker: m[1].trim(),
                emotion: (m[2] || "neutral").trim(),
                position: (m[3] || "left").trim(),
                text: m[4].trim()
            };
        }
        return { speaker: "서술", emotion: "neutral", position: "center", text: line };
    });

    const LPS = 4; 
    const segs = [];
    for (let i=0; i<dlines.length; i+=LPS) segs.push(dlines.slice(i, i+LPS));

    const scenes = {};
    const ts = Date.now();

    segs.forEach((seg, i) => {
        const id = `scene_${i}`;
        const isRouteSplit = (i === segs.length - 2); 

        scenes[id] = {
            bg: getBgUrl(i+ts),
            lines: seg,
            isRouteSplit,
            choices: i < segs.length - 1 && !isRouteSplit ? [
                { text: "🤝 동의한다", next: `${id}_a`, mood: "trust" },
                { text: "⚡ 반박한다", next: `${id}_b`, mood: "bold" },
            ] : null
        };
        scenes[`${id}_a`] = { lines: [{speaker:"서술", text:"당신의 선택이 분위기를 부드럽게 만들었다.", position:"center"}], nextScene: `scene_${i+1}`, bg: scenes[id].bg };
        scenes[`${id}_b`] = { lines: [{speaker:"서술", text:"당신의 결단력이 흐름을 바꾸었다.", position:"center"}], nextScene: `scene_${i+1}`, bg: scenes[id].bg };
    });

    const routes = ["trust", "bold", "neutral"];
    routes.forEach(r => {
        scenes[`route_${r}_end`] = {
            bg: getBgUrl(`end_${r}`),
            lines: [{ speaker: "서술", text: `이야기는 ${r}의 결말로 이어졌습니다.`, position:"center" }],
            endStage: true
        };
    });

    return { id: 'novel_'+ts, meta: { title: title || "새로운 이야기" }, stages: [{id:'st_1', firstScene:'scene_0'}], scenes: { 'st_1': scenes } };
}

/* ══════════════════════════════════════
   메인 컴포넌트
══════════════════════════════════════ */
const App = () => {
    const [screen, setScreen] = useState('LIBRARY');
    const [library, setLibrary] = useState([]);
    const [novel, setNovel] = useState(null);
    
    // 모르는 이름(나루토, 사스케)을 넣어도 작동하는지 테스트하는 대본
    const DEFAULT_SCRIPT = `나루토|happy|left: 드디어 새로운 대본을 넣었군!
사스케|neutral|right: 바보 녀석, 엔진이 우리 얼굴을 알아서 만들어줄 거라고.
나루토|bold|left: 진짜? 시드 기반이라 계속 똑같은 얼굴로 나온다며?
사스케|shy|right: ...아마도.
나루토|exit|left:
사스케|sad|right: 혼자 남았군.`;
    
    const [rawText, setRawText] = useState(DEFAULT_SCRIPT);
    
    const [stageId, setStageId] = useState(null);
    const [sceneId, setSceneId] = useState(null);
    const [lineIdx, setLineIdx] = useState(0);
    const [gameState, setGameState] = useState({ choices: [], stats: {} });
    
    const [displayed, setDisplayed] = useState("");
    const [typing, setTyping] = useState(false);
    
    const [visuals, setVisuals] = useState({ bg: '', left: null, right: null, charVisible: false });
    const [isTransitioning, setIsTransitioning] = useState(false);

    const timerRef = useRef(null);

    const getRoute = (state) => {
        const s = state.stats;
        if ((s.trust || 0) >= 1) return "trust";
        if ((s.bold || 0) >= 1) return "bold";
        return "neutral";
    };

    const goToScene = async (nextId, forcedNovel = null, forcedStage = null) => {
        setIsTransitioning(true);
        const targetNovel = forcedNovel || novel;
        const targetStage = forcedStage || stageId;
        const nextScene = targetNovel.scenes[targetStage][nextId];
        
        const firstLine = nextScene.lines[0];
        let nextLeft = visuals.left;
        let nextRight = visuals.right;

        // 🔥 모르는 이름이 들어와도 그냥 생성 함수로 던짐
        if (firstLine && firstLine.speaker !== "서술") {
            const url = getCharacterUrl(firstLine.speaker, firstLine.emotion);
            if (firstLine.position === "right") nextRight = url;
            else nextLeft = url;
        }

        setVisuals(v => ({ ...v, bg: nextScene.bg, charVisible: false }));
        
        const preloads = [];
        if (nextLeft && nextLeft !== visuals.left) preloads.push(preloadImage(nextLeft, 5000));
        if (nextRight && nextRight !== visuals.right) preloads.push(preloadImage(nextRight, 5000));
        
        const loadedUrls = await Promise.all(preloads);
        
        if(loadedUrls.length > 0) {
            if (nextLeft && nextLeft !== visuals.left) nextLeft = loadedUrls[0];
            if (nextRight && nextRight !== visuals.right) nextRight = loadedUrls[loadedUrls.length - 1];
        }

        if(forcedNovel) { setNovel(forcedNovel); setStageId(targetStage); }
        setSceneId(nextId);
        setLineIdx(0);
        
        setVisuals({ bg: nextScene.bg, left: nextLeft, right: nextRight, charVisible: true });
        setIsTransitioning(false);
    };

    const startGame = async (n) => {
        setGameState({choices:[], stats:{}});
        setScreen('PLAY');
        await goToScene('scene_0', n, 'st_1');
    };

    const advance = () => {
        const scene = novel.scenes[stageId][sceneId];
        
        if (typing) { 
            setDisplayed(scene.lines[lineIdx].text); 
            setTyping(false); 
            clearInterval(timerRef.current); 
            return; 
        }
        
        if (isTransitioning) return;
        
        if (lineIdx < scene.lines.length - 1) {
            const nextIdx = lineIdx + 1;
            const nextLine = scene.lines[nextIdx];
            
            setVisuals(prev => {
                const nv = { ...prev };
                if (nextLine.speaker !== "서술") {
                    const pos = nextLine.position === "right" ? "right" : "left";
                    if (nextLine.emotion === "exit") nv[pos] = null;
                    else nv[pos] = getCharacterUrl(nextLine.speaker, nextLine.emotion); // 🔥 자동 갱신
                }
                return nv;
            });
            
            setLineIdx(nextIdx);
        } else if (scene.isRouteSplit) {
            goToScene(`route_${getRoute(gameState)}_end`);
        } else if (scene.nextScene) {
            goToScene(scene.nextScene);
        }
    };

    const pickChoice = (c) => {
        if (isTransitioning) return;
        setGameState(prev => ({
            choices: [...prev.choices, c.mood],
            stats: { ...prev.stats, [c.mood]: (prev.stats[c.mood] || 0) + 1 }
        }));
        goToScene(c.next);
    };

    useEffect(() => {
        if (screen !== 'PLAY' || !novel || !sceneId || isTransitioning) return;
        const line = novel.scenes[stageId][sceneId].lines[lineIdx];
        setDisplayed(""); setTyping(true);
        let i = 0;
        timerRef.current = setInterval(() => {
            if (i < line.text.length) setDisplayed(line.text.substring(0, ++i));
            else { setTyping(false); clearInterval(timerRef.current); }
        }, 35);
        return () => clearInterval(timerRef.current);
    }, [sceneId, lineIdx, screen, isTransitioning]);

    if (screen === 'LIBRARY') return (
        <div className="fixed inset-0 bg-zinc-950 text-white overflow-y-auto p-6 custom-scrollbar">
            <div className="max-w-3xl mx-auto mt-10">
                <h1 className="text-3xl font-black mb-8 text-shimmer tracking-widest uppercase">Visual Novel Universal</h1>
                <div className="bg-zinc-900 p-6 rounded-2xl mb-10 border border-zinc-800 shadow-2xl">
                    <p className="text-xs text-zinc-400 mb-3 font-bold uppercase">어떤 이름이든 알아서 그려줍니다! (형식: 화자|감정|위치: 대사)</p>
                    <textarea 
                        value={rawText} onChange={e=>setRawText(e.target.value)}
                        className="w-full h-56 bg-black p-4 rounded-xl mb-4 outline-none border border-zinc-700 focus:border-red-500 transition-all text-[15px] font-medium custom-scrollbar leading-relaxed"
                    />
                    <button onClick={() => {
                        if(!rawText.trim()) return;
                        const n = parseNovel(rawText);
                        setLibrary([n, ...library]);
                        startGame(n);
                    }} className="w-full py-4 bg-red-700 hover:bg-red-600 active:scale-95 transition-all rounded-xl font-bold flex items-center justify-center gap-2 tracking-widest shadow-lg shadow-red-900/50">
                        <IcoZap/> 자동 캐스팅 및 무대 입장
                    </button>
                </div>
            </div>
        </div>
    );

    if (screen === 'PLAY') {
        const scene = novel?.scenes?.[stageId]?.[sceneId];
        const line = scene?.lines?.[lineIdx];
        const isAtEnd = !typing && line && lineIdx === scene.lines.length - 1;
        const activePos = line?.position || "center";
        const isNarration = line?.speaker === "서술" || !line;

        return (
            <div className="fixed inset-0 bg-black text-white overflow-hidden">
                <div className="absolute inset-0 bg-cover bg-center transition-all duration-1000 ease-in-out" 
                     style={{backgroundImage:`url(${visuals.bg})`, filter:'brightness(0.35)'}}/>
                
                <div className="absolute inset-0 pointer-events-none flex justify-center items-end">
                    {/* LEFT Character */}
                    {visuals.left && (
                        <img 
                            src={visuals.left} 
                            className="absolute left-[5%] bottom-0 md:bottom-[-20px] h-[95%] md:h-[105%] object-contain transition-all duration-500 ease-out origin-bottom" 
                            style={{
                                opacity: visuals.charVisible ? (activePos === "left" || isNarration ? 1 : 0.4) : 0,
                                transform: visuals.charVisible ? (activePos === "left" ? "scale(1.02)" : "scale(0.95)") : "scale(0.95)",
                                zIndex: activePos === "left" ? 20 : 10,
                                filter: activePos === "left" ? "brightness(1.1) drop-shadow(0 0 20px rgba(0,0,0,0.5))" : "brightness(0.5)"
                            }} 
                        />
                    )}

                    {/* RIGHT Character */}
                    {visuals.right && (
                        <img 
                            src={visuals.right} 
                            className="absolute right-[5%] bottom-0 md:bottom-[-20px] h-[95%] md:h-[105%] object-contain transition-all duration-500 ease-out origin-bottom" 
                            style={{
                                opacity: visuals.charVisible ? (activePos === "right" || isNarration ? 1 : 0.4) : 0,
                                transform: visuals.charVisible ? `scaleX(-1) ${activePos === "right" ? "scale(1.02)" : "scale(0.95)"}` : "scaleX(-1) scale(0.95)",
                                zIndex: activePos === "right" ? 20 : 10,
                                filter: activePos === "right" ? "brightness(1.1) drop-shadow(0 0 20px rgba(0,0,0,0.5))" : "brightness(0.5)"
                            }} 
                        />
                    )}
                </div>

                {isTransitioning && (
                    <div className="absolute inset-0 z-[100] flex flex-col items-center justify-center pointer-events-none bg-black/30 backdrop-blur-sm transition-opacity duration-300">
                        <div className="w-8 h-8 border-4 border-red-600 border-t-transparent rounded-full animate-spin opacity-80 mb-4"></div>
                        <span className="text-[10px] font-bold tracking-[0.2em] text-red-500/80">CASTING ACTORS...</span>
                    </div>
                )}

                <div className="absolute top-4 left-4 right-4 z-50 flex justify-between transition-opacity duration-300" style={{opacity: visuals.charVisible && !isTransitioning ? 1 : 0}}>
                    <button onClick={() => setScreen('LIBRARY')} className="bg-black/50 px-4 py-2 rounded-full text-xs font-bold border border-white/10 hover:bg-red-700 transition-colors">EXIT</button>
                </div>

                {isAtEnd && scene?.choices && visuals.charVisible && !isTransitioning && (
                    <div className="absolute inset-x-0 bottom-48 px-4 md:px-10 z-50 animate-fade-in-up">
                        {scene.choices.map((c, i) => (
                            <button key={i} onClick={() => pickChoice(c)} className="choice-btn">
                                <span>{c.text}</span><IcoChevron/>
                            </button>
                        ))}
                    </div>
                )}

                {scene && !isTransitioning && (
                    <div className="dialog-outer transition-opacity duration-300" onClick={advance} style={{opacity: visuals.charVisible ? 1 : 0}}>
                        <div className="dialog-inner shadow-2xl border-t border-white/10">
                            {line?.speaker !== "서술" && <div className="speaker-badge">{line?.speaker}</div>}
                            <div className="dialog-text custom-scrollbar" style={{marginTop: line?.speaker==="서술" ? '15px' : '0'}}>
                                <p className="text-[17px] md:text-[19px] leading-[1.8] font-medium text-zinc-100 word-break-keep" style={{color: line?.speaker==="서술" ? '#a1a1aa' : '#f4f4f5'}}>
                                    {displayed}
                                    {typing && <span className="cursor-blink text-red-500 ml-1">█</span>}
                                </p>
                            </div>
                            <div className="px-5 pb-3 flex justify-between items-center opacity-40 text-[10px] font-bold">
                                <span>{lineIdx + 1} / {scene.lines.length}</span>
                                {!typing && !scene.choices && <span className="flex items-center gap-1 animate-pulse">TAP TO CONTINUE <IcoChevron/></span>}
                            </div>
                        </div>
                    </div>
                )}

                {isAtEnd && scene?.endStage && visuals.charVisible && !isTransitioning && (
                    <div className="absolute inset-0 bg-black/90 z-[60] flex flex-col items-center justify-center p-10 text-center animate-fade-in-up backdrop-blur-md">
                        <h2 className="text-5xl font-black mb-3 text-red-600 tracking-widest text-shadow-lg">CURTAIN CALL</h2>
                        <button onClick={() => setScreen('LIBRARY')} className="mt-10 bg-white hover:bg-zinc-200 text-black px-12 py-4 rounded-full font-black tracking-widest transition-transform active:scale-95">
                            스테이지 나가기
                        </button>
                    </div>
                )}
            </div>
        );
    }

    return null;
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
