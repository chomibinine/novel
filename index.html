<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI visual novel</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        /* 화면이 나타날 때 부드러운 애니메이션 효과 */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up {
            animation: fadeInUp 0.5s ease-out forwards;
        }

        body { 
          margin: 0; 
          background: #000; /* 배경을 검은색으로 고정 */
          font-family: sans-serif;
          overscroll-behavior: none; /* 모바일에서 당겨서 새로고침 방지 */
          -webkit-touch-callout: none; /* 롱클릭 시 메뉴 차단 */
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const App = () => {
          // --- 데이터 설정 ---
          // 예시로 사용할 캐릭터 이미지 URL (로컬 파일 경로로 바꾸셔도 됩니다)
          const [characterImageUrl, setCharacterImageUrl] = useState("https://image.pollinations.ai/prompt/anime%20visual%20novel%20character%20portrait%20smiling%20high%20quality?width=500&height=800&nologo=true");
          const [characterName, setCharacterName] = useState("아리");

          return (
            // fixed inset-0: 화면 전체를 덮도록 설정
            <div className="fixed inset-0 w-full h-full bg-black text-white flex flex-col select-none overflow-hidden">
              
              {/* --- 배경 이미지 영역 --- */}
              <div className="absolute inset-0 z-0 pointer-events-none">
                {/* 배경 이미지 예시: pollinations.ai를 통해 생성된 예쁜 카페 배경 */}
                <img 
                    src="https://image.pollinations.ai/prompt/anime%20scenery%20visual%20novel%20background%20beautiful%20cafe%20interior?width=1280&height=720&nologo=true" 
                    className="w-full h-full object-cover brightness-[0.4]" 
                />
              </div>

              {/* --- 상단 UI (캐릭터 이름 등) --- */}
              <div className="relative z-20 w-full p-6 flex justify-center pointer-events-none">
                <div className="bg-black/80 px-4 py-1.5 border-l-4 border-red-600 backdrop-blur-sm shadow-xl">
                  <div className="text-xl font-serif font-bold italic text-white tracking-tight">
                      {characterName}
                  </div>
                </div>
              </div>

              {/* --- 캐릭터 이미지 영역 (핵심 부분) --- */}
              {/* flex-1: 남은 화면 공간을 모두 차지 */}
              {/* flex items-end: 이미지를 화면 아래쪽에 정렬 */}
              <div className="relative z-10 flex-1 min-h-0 flex justify-center items-end pointer-events-none px-4">
                <div className="relative animate-fade-in-up w-full max-w-[280px] md:max-w-[400px] h-[90%] flex items-end">
                  
                  {/* --- 캐릭터 본체 이미지 --- */}
                  <img 
                    src={characterImageUrl} 
                    alt={characterName} 
                    className="w-full h-full object-contain object-bottom drop-shadow-[0_0_50px_rgba(0,0,0,0.9)] opacity-95 transition-all duration-300"
                  />
                  
                  {/* 캐릭터 이름 띠 (빨간색) */}
                  <div className="absolute bottom-6 left-0 w-full py-1.5 flex flex-col items-center bg-gradient-to-t from-black via-black/80 to-transparent">
                      <span className="bg-red-700 text-white px-4 py-1 font-black skew-x-[-15deg] text-base md:text-xl uppercase mt-1 shadow-lg">
                        {characterName}
                      </span>
                  </div>
                </div>
              </div>

              {/* --- 하단 UI (대사창 예시) --- */}
              {/* pointer-events-auto: 클릭 가능하도록 설정 */}
              <div className="relative z-20 w-full shrink-0 px-4 pb-8 md:px-6 md:pb-10 pt-2 pointer-events-auto h-[320px] md:h-[360px] flex flex-col justify-end max-w-4xl mx-auto">
                <div className="bg-black/90 border-2 border-white/20 p-6 md:p-8 relative rounded-sm shadow-2xl backdrop-blur-md">
                    <div className="text-base md:text-xl font-medium leading-relaxed text-zinc-100 flex-grow break-keep mb-2 overflow-y-auto custom-scrollbar">
                        "안녕! AI 비주얼 노벨의 세계에 온 걸 환영해.<br/> 
                         이렇게 캐릭터 이미지를 띄우는 것부터 시작해서 이야기를 풀어나가는 거야.<br/>
                         앞으로 더 많은 걸 보여줄게!"
                    </div>
                </div>
              </div>
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
