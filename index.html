    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ==========================================

        // ==========================================
        const IconChevronRight = ({size=24, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>;

        const IconDroplets = ({size=24, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M7 16.3c2.2 0 4-1.83 4-4.05 0-1.16-.57-2.26-1.71-3.19S7 2.9 7 2.9s-2.29 6.16-2.29 6.16c-1.14.93-1.71 2.03-1.71 3.19C3 14.47 4.8 16.3 7 16.3z"/><path d="M20.5 10.4c1.14.93 1.71 2.03 1.71 3.19 0 2.22-1.8 4.05-4 4.05s-4-1.83-4-4.05c0-1.16.57-2.26 1.71-3.19.01 0 2.29-6.16 2.29-6.16s2.28 6.16 2.29 6.16z"/></svg>;
        const IconLibrary = ({size=24, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>;
        const IconPlay = ({size=24, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>;
        const IconCpu = ({size=24, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="4" y="4" width="16" height="16" rx="2" ry="2"/><rect x="9" y="9" width="6" height="6"/><line x1="9" y1="1" x2="9" y2="4"/><line x1="15" y1="1" x2="15" y2="4"/><line x1="9" y1="20" x2="9" y2="23"/><line x1="15" y1="20" x2="15" y2="23"/><line x1="20" y1="9" x2="23" y2="9"/><line x1="20" y1="14" x2="23" y2="14"/><line x1="1" y1="9" x2="4" y2="9"/><line x1="1" y1="14" x2="4" y2="14"/></svg>;
        const IconUploadCloud = ({size=24, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/><polyline points="16 16 12 12 8 16"/></svg>;
        const IconLock = ({size=24, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>;
        const IconScissors = ({size=24, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="6" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><line x1="20" y1="4" x2="8.12" y2="15.88"/><line x1="14.47" y1="14.48" x2="20" y2="20"/><line x1="8.12" y1="8.12" x2="12" y2="12"/></svg>;
        const IconImage = ({size=24, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>;
        const IconKey = ({size=24, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>;

        const getSafeUrl = (url) => {
            if (!url) return '';
            const decoded = url.replace(/%20/g, ' ');
            return decoded.replace(/ /g, '%20').replace(/\(/g, '%28').replace(/\)/g, '%29');
        };

        const colorStyles = {
            red: { bg: 'bg-red-600', text: 'text-red-500', border: 'border-red-600', gradient: 'from-red-600' },
            blue: { bg: 'bg-blue-600', text: 'text-blue-500', border: 'border-blue-600', gradient: 'from-blue-600' },
            green: { bg: 'bg-green-600', text: 'text-green-500', border: 'border-green-600', gradient: 'from-green-600' },
            purple: { bg: 'bg-purple-600', text: 'text-purple-500', border: 'border-purple-600', gradient: 'from-purple-600' },
            yellow: { bg: 'bg-yellow-600', text: 'text-yellow-500', border: 'border-yellow-600', gradient: 'from-yellow-600' },
            pink: { bg: 'bg-pink-600', text: 'text-pink-500', border: 'border-pink-600', gradient: 'from-pink-600' },
            zinc: { bg: 'bg-zinc-600', text: 'text-zinc-500', border: 'border-zinc-600', gradient: 'from-zinc-600' },
            default: { bg: 'bg-zinc-600', text: 'text-zinc-500', border: 'border-zinc-600', gradient: 'from-zinc-600' }
        };

        const getColorClass = (colorName, type) => {
            if (!colorName) return colorStyles.default[type];
            const name = colorName.toLowerCase();
            return (colorStyles[name] && colorStyles[name][type]) ? colorStyles[name][type] : colorStyles.default[type];
        };

        async function fetchWithRetry(url, options, retries = 5) {
          const delays = [1000, 2000, 4000, 8000, 16000];
          for (let i = 0; i < retries; i++) {
            try {
              const res = await fetch(url, options);
              if (!res.ok) {
                  // [수정] 서버의 상세 에러 메시지를 가로채서 화면에 표시하도록 변경
                  const errText = await res.text();
                  let parsedMsg = `서버 상태 코드: ${res.status}`;
                  try {
                      const errJson = JSON.parse(errText);
                      if (errJson.error && errJson.error.message) {
                          parsedMsg = errJson.error.message;
                      }
                  } catch (e) {
                      parsedMsg += ` | ${errText}`;
                  }
                  throw new Error(parsedMsg);
              }
              return res;
            } catch (err) {
              if (i === retries - 1) throw err;
              await new Promise(r => setTimeout(r, delays[i]));
            }
          }
        }

        if (typeof window !== 'undefined' && window.pdfjsLib) {
            window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
        }

        const chunkText = (text, maxLength = 2000) => {
          const paragraphs = text.split('\n');
          const chunks = [];
          let currentChunk = "";
          
          for(let p of paragraphs) {
            if(currentChunk.length + p.length > maxLength) {
              if(currentChunk.trim()) chunks.push(currentChunk.trim());
              currentChunk = p + '\n';
            } else {
              currentChunk += p + '\n';
            }
          }
          if(currentChunk.trim()) chunks.push(currentChunk.trim());
          return chunks;
        };

        const App = () => {
          const [appState, setAppState] = useState('LIBRARY');
          const [novelLibrary, setNovelLibrary] = useState([]);
          
          const [apiKey, setApiKey] = useState(localStorage.getItem('gemini_api_key') || '');
          
          useEffect(() => {
              localStorage.setItem('gemini_api_key', apiKey);
          }, [apiKey]);

          const [currentNovel, setCurrentNovel] = useState(null);
          const [unlockedStages, setUnlockedStages] = useState({});
          const [stats, setStats] = useState({});
          
          const [currentStageId, setCurrentStageId] = useState(null);
          const [currentSceneId, setCurrentSceneId] = useState(null);
          const [lineIndex, setLineIndex] = useState(0);
          const [displayedText, setDisplayedText] = useState("");
          const [isTyping, setIsTyping] = useState(false);
          
          const [rawText, setRawText] = useState("어두운 밤, 비가 내리는 골목길. 나는 숨을 헐떡이며 달리고 있었다. 뒤에서 누군가 쫓아오고 있다. '거기 서!' 차가운 목소리가 들렸다.");
          const [isGenerating, setIsGenerating] = useState(false);
          const [errorMsg, setErrorMsg] = useState("");
          
          const [textChunks, setTextChunks] = useState([]);
          const [currentChunkIndex, setCurrentChunkIndex] = useState(0);
          const [appendTargetId, setAppendTargetId] = useState("NEW");

          const [charImgLoaded, setCharImgLoaded] = useState(false);
          const [bgImgLoaded, setBgImgLoaded] = useState(false);

          const scrollRef = useRef(null);

          const preloadImages = (novelData) => {
            if (!novelData || !novelData.scenes) return;
            const urls = new Set();
            if (novelData.meta?.coverBg) urls.add(getSafeUrl(novelData.meta.coverBg));
            
            Object.values(novelData.scenes).forEach(stage => {
                Object.values(stage).forEach(scene => {
                    if (scene.bg) urls.add(getSafeUrl(scene.bg));
                    if (scene.character?.charImage) urls.add(getSafeUrl(scene.character.charImage));
                });
            });

            urls.forEach(url => {
                const img = new Image();
                img.src = url;
            });
          };

          const processLoadedText = (fullText) => {
            const chunks = chunkText(fullText, 2000);
            if(chunks.length > 1) {
              setTextChunks(chunks);
              setCurrentChunkIndex(0);
              setRawText(chunks[0]);
              alert(`문서가 안전하게 ${chunks.length}개의 파트로 자동 분할되었습니다!`);
            } else {
              setTextChunks([]);
              setCurrentChunkIndex(0);
              setRawText(fullText);
            }
          };

          const handleFileUpload = (event) => {
            const file = event.target.files[0];
            if (!file) return;

            const ext = file.name.split('.').pop().toLowerCase();
            setIsGenerating(true);

            if (ext === 'json') {
              const reader = new FileReader();
              reader.onload = (e) => {
                try {
                  const parsedData = JSON.parse(e.target.result);
                  const newData = Array.isArray(parsedData) ? parsedData : [parsedData];
                  setNovelLibrary(prev => [...newData, ...prev]);
                  loadNovel(newData[0]);
                } catch (error) {
                  showError("JSON 파싱 에러: 파일 형식을 확인해주세요.");
                } finally {
                  setIsGenerating(false);
                }
              };
              reader.readAsText(file);
            } else if (ext === 'txt') {
              const reader = new FileReader();
              reader.onload = (e) => {
                processLoadedText(e.target.result);
                setIsGenerating(false);
              };
              reader.readAsText(file);
            } else if (ext === 'docx') {
              const reader = new FileReader();
              reader.onload = async (e) => {
                try {
                  const result = await mammoth.extractRawText({arrayBuffer: e.target.result});
                  processLoadedText(result.value);
                } catch(err) {
                  showError("DOCX 추출에 실패했습니다.");
                } finally {
                  setIsGenerating(false);
                }
              };
              reader.readAsArrayBuffer(file);
            } else if (ext === 'pdf') {
              const reader = new FileReader();
              reader.onload = async (e) => {
                try {
                  if(!window.pdfjsLib) throw new Error("PDF 라이브러리가 아직 로드되지 않았습니다.");
                  const typedarray = new Uint8Array(e.target.result);
                  const pdf = await window.pdfjsLib.getDocument(typedarray).promise;
                  let text = "";
                  for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const textContent = await page.getTextContent();
                    const pageText = textContent.items.map(item => item.str).join(' ');
                    text += pageText + "\n";
                  }
                  processLoadedText(text);
                } catch(err) {
                  showError("PDF 추출에 실패했습니다.");
                } finally {
                  setIsGenerating(false);
                }
              };
              reader.readAsArrayBuffer(file);
            }
            event.target.value = null;
          };

          const handleManualSplit = () => {
            const chunks = chunkText(rawText, 2000);
            if(chunks.length > 1) {
              setTextChunks(chunks);
              setCurrentChunkIndex(0);
              setRawText(chunks[0]);
              alert(`텍스트가 성공적으로 ${chunks.length}개의 파트로 분할되었습니다.`);
            } else {
              alert("분할할 만큼 텍스트가 길지 않습니다. (현재 1개 파트로 충분함)");
            }
          };

          const handleAIGeneration = async () => {
            if (!apiKey.trim()) {
              showError("Google Gemini API 키를 상단 입력칸에 입력해주세요!");
              return;
            }
            if (!rawText.trim()) {
              showError("텍스트를 입력해주세요.");
              return;
            }
            
            setIsGenerating(true);
            setErrorMsg("");

            const systemInstruction = `당신은 비주얼 노벨 게임 엔진의 완벽한 텍스트 파서입니다.

[가장 중요한 치명적 절대 규칙]
1. 각 씬의 "choices" 배열은 **무조건 정확히 2개의 객체**를 가져야 합니다.
2. 이야기의 가장 마지막 씬에만 "endStage": true를 넣고 choices를 비우세요.
3. [이미지 생성 규칙] "bg"(배경)와 "charImage"(캐릭터) 필드에 들어갈 이미지 URL을 반드시 다음 양식으로 생성하세요.
   - 배경 (bg) URL 형식: https://image.pollinations.ai/prompt/anime%20visual%20novel%20background%20{배경_영문_묘사}?width=720&height=1280&nologo=true
   - 캐릭터 (charImage) URL 형식: https://image.pollinations.ai/prompt/masterpiece%20best%20quality%20beautiful%20anime%20girl%20{캐릭터_특징}?width=720&height=1280&nologo=true
   - **중요(속도 및 안전성):** AI 이미지 생성 속도를 높이기 위해 해상도를 720x1280으로 고정합니다. URL 안에는 절대 한글이나 띄어쓰기, 괄호 같은 특수문자가 들어가면 안 됩니다. 단어 사이는 무조건 '%20'으로 치환하세요. 오직 순수 영단어와 %20만 사용하세요.
4. 모든 "color" 필드는 오직 "red", "blue", "green", "purple", "yellow", "pink", "zinc" 중 하나의 영단어만 사용해야 합니다.
5. 출력은 오직 순수한 JSON 형식이어야 합니다. 마크다운(\`\`\`json) 금지.

[JSON 포맷 구조 예시]
{
  "id": "novel_auto",
  "meta": {
    "title": "자동 생성 스토리",
    "author": "AI",
    "coverBg": "https://image.pollinations.ai/prompt/anime%20visual%20novel%20cover%20dark%20romance?width=720&height=1280&nologo=true",
    "description": "사용자 입력 원문 무삭제 진행본",
    "protagonist": { "name": "주인공", "role": "역할", "pov": "Player POV" },
    "statsConfig": [
      { "key": "desire", "label": "Desire", "color": "red" }
    ]
  },
  "stages": [
    { "id": "stage_1", "title": "에피소드 제목", "charName": "상대방", "role": "역할", "color": "red", "isUnlocked": true, "firstScene": "scene1" }
  ],
  "scenes": {
    "stage_1": {
      "scene1": {
        "bg": "https://image.pollinations.ai/prompt/anime%20visual%20novel%20background%20dark%20office%20night%20rain?width=720&height=1280&nologo=true",
        "character": { 
          "name": "상대방", 
          "role": "역할", 
          "color": "blue",
          "charImage": "https://image.pollinations.ai/prompt/masterpiece%20best%20quality%20beautiful%20anime%20girl%20long%20hair?width=720&height=1280&nologo=true"
        },
        "lines": [ { "speaker": "주인공", "text": "원문 문장..." } ],
        "choices": [
          { "text": "[선택1]", "next": "scene2", "impact": { "desire": 10 } },
          { "text": "[선택2]", "next": "scene1_recovery", "impact": { "desire": 5 } }
        ]
      }
    }
  }
}`;

            try {
              // 🚨 수정된 부분: 2026년 기준 가장 최신이자 안정적인 gemini-2.5-flash 모델로 확정 변경했습니다.
              const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
              
              const payload = {
                contents: [{ parts: [{ text: rawText }] }],
                systemInstruction: { parts: [{ text: systemInstruction }] },
                generationConfig: { responseMimeType: "application/json" }
              };

              const response = await fetchWithRetry(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
              });

              const data = await response.json();
              
              if (!data.candidates || data.candidates.length === 0 || !data.candidates[0].content) {
                throw new Error("AI 응답이 비어있습니다. (API Key가 유효한지 다시 확인해주세요.)");
              }

              let jsonText = data.candidates[0].content.parts[0].text;
              jsonText = jsonText.replace(/```json/g, '').replace(/```/g, '').trim();
              
              let parsedNovel;
              try {
                parsedNovel = JSON.parse(jsonText);
              } catch (parseError) {
                throw new Error("생성된 데이터 구조가 끊어졌습니다. 텍스트를 조금 더 짧게 줄여서 다시 시도해주세요.");
              }
              
              let createdNovelId = "";

              if (appendTargetId === "NEW") {
                parsedNovel.id = 'novel_' + Date.now();
                createdNovelId = parsedNovel.id;
                let stTitle = parsedNovel.stages?.[0]?.title?.replace(/\[\d+화\]\s*/g, '') || "기본 에피소드";
                if(parsedNovel.stages && parsedNovel.stages[0]) {
                   parsedNovel.stages[0].title = `[1화] ${stTitle}`;
                }
                
                setNovelLibrary(prev => [parsedNovel, ...prev]);
              } else {
                createdNovelId = appendTargetId;
                setNovelLibrary(prev => {
                  const updatedLibrary = [...prev];
                  const targetIndex = updatedLibrary.findIndex(n => n.id === appendTargetId);
                  
                  if (targetIndex !== -1) {
                    const targetNovel = JSON.parse(JSON.stringify(updatedLibrary[targetIndex]));
                    const newStageId = 'stage_' + Date.now();
                    const oldStageId = parsedNovel.stages?.[0]?.id;
                    
                    if(parsedNovel.stages && parsedNovel.stages[0] && parsedNovel.scenes && oldStageId) {
                        const newStage = { ...parsedNovel.stages[0], id: newStageId };
                        newStage.isUnlocked = true; 
                        
                        let stTitle = newStage.title.replace(/\[\d+화\]\s*/g, '');
                        newStage.title = `[${targetNovel.stages.length + 1}화] ${stTitle}`;
                        
                        targetNovel.stages.push(newStage);
                        targetNovel.scenes[newStageId] = parsedNovel.scenes[oldStageId];
                        
                        updatedLibrary[targetIndex] = targetNovel;
                    }
                    return updatedLibrary;
                  }
                  return prev;
                });
              }

              setTimeout(() => {
                if (textChunks.length > 0 && currentChunkIndex < textChunks.length - 1) {
                  const nextIdx = currentChunkIndex + 1;
                  setCurrentChunkIndex(nextIdx);
                  setRawText(textChunks[nextIdx]);
                  setAppendTargetId(createdNovelId); 
                  
                  alert(`[파트 ${currentChunkIndex + 1}/${textChunks.length}] 변환 성공! 다음 파트가 자동으로 로드되었습니다.`);
                } else {
                  setRawText("");
                  setTextChunks([]);
                  setCurrentChunkIndex(0);
                  
                  const targetNovelToLoad = novelLibrary.find(n => n.id === createdNovelId) || parsedNovel;
                  alert(`모든 변환이 완료되었습니다! 생성된 게임을 실행합니다.`);
                  
                  setNovelLibrary(currentLib => {
                    const finalNovel = currentLib.find(n => n.id === createdNovelId) || parsedNovel;
                    loadNovel(finalNovel);
                    return currentLib;
                  });
                }
              }, 100);

            } catch (err) {
              console.error(err);
              let detailMsg = "알 수 없는 오류가 발생했습니다.";
              if (err.message) detailMsg = err.message;
              showError(`변환 실패: ${detailMsg}`);
            } finally {
              setIsGenerating(false);
            }
          };

          const showError = (msg) => {
            setErrorMsg(msg);
            setTimeout(() => setErrorMsg(""), 6000);
          };

          const loadNovel = (novel) => {
            setCurrentNovel(novel);
            const initialUnlocks = {};
            if(novel.stages) {
                novel.stages.forEach(st => initialUnlocks[st.id] = true);
            }
            setUnlockedStages(initialUnlocks);
            
            const initialStats = {};
            if(novel.meta?.statsConfig) {
                novel.meta.statsConfig.forEach(sc => initialStats[sc.key] = 0);
            }
            setStats(initialStats);
            setAppState('HUB');

            preloadImages(novel);
          };

          const startStage = (stageId) => {
            const stageInfo = currentNovel.stages?.find(s => s.id === stageId);
            if(!stageInfo) return;

            let stageScenes = currentNovel.scenes?.[stageId];
            if (!stageScenes && currentNovel.scenes) {
                stageScenes = currentNovel.scenes[Object.keys(currentNovel.scenes)[0]];
            }

            let sceneId = stageInfo.firstScene;
            if (!sceneId || !stageScenes?.[sceneId]) {
                sceneId = stageScenes ? Object.keys(stageScenes)[0] : null;
            }

            setCurrentStageId(stageId);
            setCurrentSceneId(sceneId);
            setLineIndex(0);
            setAppState('PLAY');
          };

          let stageScenes = currentNovel?.scenes?.[currentStageId];
          if (!stageScenes && currentNovel?.scenes) {
              stageScenes = currentNovel.scenes[Object.keys(currentNovel.scenes)[0]];
          }
          const sceneData = (currentStageId && currentSceneId && stageScenes) 
            ? stageScenes[currentSceneId] 
            : null;

          const currentStageIndex = currentNovel?.stages?.findIndex(s => s.id === currentStageId) ?? -1;
          const hasNextStage = currentNovel && currentStageIndex !== -1 && currentStageIndex < (currentNovel.stages?.length || 0) - 1;
          const nextStage = hasNextStage ? currentNovel.stages[currentStageIndex + 1] : null;

          useEffect(() => {
            setCharImgLoaded(false);
            setBgImgLoaded(false);
          }, [currentSceneId]);

          useEffect(() => {
            if (appState !== 'PLAY' || !sceneData || !sceneData.lines) return;
            
            if(lineIndex >= sceneData.lines.length) {
                setLineIndex(0);
                return;
            }

            const currentLine = sceneData.lines[lineIndex];
            if (!currentLine) return;

            setIsTyping(true);
            setDisplayedText(""); 
            let i = 0;
            
            const typingInterval = setInterval(() => {
              if (i < (currentLine.text?.length || 0)) {
                setDisplayedText(currentLine.text.substring(0, i + 1));
                i++;
              } else {
                clearInterval(typingInterval);
                setIsTyping(false);
              }
            }, 20);

            return () => clearInterval(typingInterval);
          }, [currentSceneId, lineIndex, appState, sceneData]);

          useEffect(() => {
            if (scrollRef.current) scrollRef.current.scrollTop = 0;
          }, [currentSceneId, lineIndex]);

          const handleBoxClick = () => {
            if (appState !== 'PLAY' || !sceneData || !sceneData.lines) return;
            const currentLine = sceneData.lines[lineIndex];
            
            if (isTyping) {
              setDisplayedText(currentLine?.text || "");
              setIsTyping(false);
            } else {
              if (lineIndex < sceneData.lines.length - 1) {
                setLineIndex(prev => prev + 1);
              } else if (sceneData.nextScene) {
                setCurrentSceneId(sceneData.nextScene);
                setLineIndex(0);
              }
            }
          };

          const handleChoice = (choice) => {
            if (choice.impact) {
              const newStats = { ...stats };
              Object.keys(choice.impact).forEach(k => {
                if(newStats[k] !== undefined) newStats[k] += choice.impact[k];
              });
              setStats(newStats);
            }
            setCurrentSceneId(choice.next);
            setLineIndex(0);
          };

          const handleStageEnd = () => {
            if (sceneData?.unlocks) {
              setUnlockedStages(prev => ({...prev, [sceneData.unlocks]: true}));
            }
            setAppState('HUB');
          };

          const getStageIcon = (iconStr) => {
            switch(iconStr) {
              case 'Briefcase': return <IconBriefcase size={20} />;
              case 'User': return <IconUser size={20} />;
              case 'ShieldAlert': return <IconShieldAlert size={20} />;
              case 'BookOpen': return <IconBookOpen size={20} />;
              case 'Flame': return <IconFlame size={20} />;
              default: return <IconDroplets size={20} />;
            }
          };

          const linesCount = sceneData?.lines?.length || 0;
          const showActionArea = !isTyping && linesCount > 0 && lineIndex === linesCount - 1;

          if (appState === 'LIBRARY') {
            return (
              <div className="fixed inset-0 w-full h-full bg-zinc-950 text-white flex flex-col overflow-y-auto">
                {errorMsg && (
                  <div className="fixed top-4 left-1/2 transform -translate-x-1/2 bg-red-600 text-white px-6 py-4 rounded-md shadow-2xl z-50 font-bold animate-fade-in-up max-w-[90%] text-center break-keep">
                    {errorMsg}
                  </div>
                )}
                <div className="max-w-5xl mx-auto w-full pt-10 px-4 md:px-6 pb-12">
                  <div className="flex items-center gap-3 mb-6">
                    <IconLibrary size={32} className="text-red-500 shrink-0" />
                    <h1 className="text-2xl md:text-4xl font-black uppercase tracking-widest break-keep">AI Novel Engine</h1>
                  </div>
                  <p className="text-zinc-400 mb-10 text-sm md:text-base break-keep">
                    PDF, DOCX, TXT 문서를 업로드하세요. 엔진이 스토리를 분석하여 배경과 캐릭터 일러스트까지 실시간으로 생성해 줍니다!
                  </p>
                  
                  <div className="mb-6 bg-zinc-900 border border-zinc-700 rounded-xl overflow-hidden shadow-2xl p-4 md:p-6 flex flex-col sm:flex-row items-center gap-4">
                      <div className="flex items-center gap-2 text-zinc-300 w-full sm:w-auto shrink-0">
                          <IconKey size={20} className="text-red-400" />
                          <span className="font-bold text-sm">Gemini API 키</span>
                      </div>
                      <input 
                          type="password" 
                          value={apiKey} 
                          onChange={(e) => setApiKey(e.target.value)} 
                          placeholder="AIzaSy... (입력된 키는 기기에만 안전하게 보관됩니다)"
                          className="flex-grow w-full bg-black border border-zinc-700 rounded-md p-3 text-white text-sm focus:outline-none focus:border-red-500 transition-colors"
                      />
                  </div>

                  <div className="mb-10 bg-zinc-900 border border-zinc-700 rounded-xl overflow-hidden shadow-2xl flex flex-col">
                    <div className="bg-zinc-800 p-4 border-b border-zinc-700 flex flex-wrap items-center justify-between gap-3">
                      <div className="flex items-center gap-2 font-bold text-red-400">
                        <IconCpu size={20} /> AI 자동 분할 & 일러스트 생성 변환기
                      </div>
                      
                      <div className="flex gap-2">
                        <button onClick={handleManualSplit} className="flex items-center gap-1 text-xs md:text-sm text-zinc-300 hover:text-white bg-zinc-700 hover:bg-zinc-600 px-3 py-1.5 rounded-md transition-colors shadow-lg">
                          <IconScissors size={16} /> 텍스트 수동 쪼개기
                        </button>
                        <div className="relative overflow-hidden cursor-pointer group flex items-center gap-1 text-xs md:text-sm text-zinc-300 hover:text-white bg-zinc-700 hover:bg-zinc-600 px-3 py-1.5 rounded-md transition-colors shadow-lg">
                          <input type="file" accept="*/*" onChange={handleFileUpload} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" />
                          <IconUploadCloud size={16} /> 문서 가져오기
                        </div>
                      </div>
                    </div>
                    <div className="p-4 md:p-6">
                      
                      {textChunks.length > 1 && (
                        <div className="mb-4 bg-red-900/30 border border-red-800 text-red-200 p-3 rounded-md text-sm md:text-base font-bold flex items-center justify-between">
                          <span>[자동 분할 진행 중] 일러스트 생성 최적화를 위해 나뉘어 변환됩니다.</span>
                          <span className="bg-red-700 text-white px-3 py-1 rounded-full shrink-0 ml-2">현재 {currentChunkIndex + 1} / {textChunks.length} 파트</span>
                        </div>
                      )}

                      <textarea 
                        value={rawText}
                        onChange={(e) => setRawText(e.target.value)}
                        placeholder="이곳에 소설 내용을 붙여넣거나 [문서 가져오기]로 파일을 업로드하세요."
                        className="w-full h-[200px] md:h-[250px] bg-black/50 border border-zinc-700 rounded-lg p-4 text-zinc-300 text-sm md:text-base focus:outline-none focus:border-red-500 custom-scrollbar resize-none mb-4"
                        disabled={isGenerating || textChunks.length > 1}
                      />
                      
                      <div className="flex flex-col md:flex-row items-start md:items-center gap-3 mb-4 bg-zinc-800/50 p-3 rounded-md border border-zinc-700/50">
                        <span className="text-sm font-bold text-zinc-400 shrink-0">저장 방식:</span>
                        <select 
                          value={appendTargetId} 
                          onChange={(e) => setAppendTargetId(e.target.value)}
                          disabled={textChunks.length > 1 && currentChunkIndex > 0}
                          className="flex-grow bg-zinc-900 border border-zinc-600 text-white text-sm rounded-md p-2 outline-none focus:border-red-500 cursor-pointer disabled:opacity-50"
                        >
                          <option value="NEW">✨ 새로운 게임으로 생성 (1화)</option>
                          {novelLibrary.map(n => (
                            <option key={n.id} value={n.id}>➕ 기존 게임에 에피소드 누적하기 ({n.meta?.title || 'Unknown'} - 현재 {n.stages?.length || 0}화)</option>
                          ))}
                        </select>
                      </div>

                      <button 
                        onClick={handleAIGeneration}
                        disabled={isGenerating}
                        className={`w-full py-4 font-black text-lg md:text-xl tracking-widest uppercase transition-all rounded-md flex items-center justify-center gap-3
                          ${isGenerating ? 'bg-zinc-700 text-zinc-400 cursor-not-allowed' : 'bg-red-700 hover:bg-red-600 text-white shadow-lg'}`}
                      >
                        {isGenerating ? (
                          <><IconCpu size={24} className="animate-spin-slow" /> 파싱 및 AI 이미지 생성 중...</>
                        ) : (
                          <><IconPlay size={24} /> 텍스트를 게임으로 변환하기</>
                        )}
                      </button>
                    </div>
                  </div>

                  <h3 className="text-xl font-black uppercase tracking-widest mb-4 border-b border-zinc-800 pb-2">Generated Novels</h3>
                  {novelLibrary.length === 0 ? (
                    <div className="text-center py-10 text-zinc-600 font-bold tracking-widest">생성된 게임이 없습니다.</div>
                  ) : (
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-6">
                      {novelLibrary.map((novel, idx) => (
                        <div key={idx} onClick={() => loadNovel(novel)} className="group relative h-[250px] md:h-[300px] rounded-xl overflow-hidden cursor-pointer shadow-xl border border-white/10 hover:border-red-500 transition-all">
                          <div className="absolute inset-0 bg-cover bg-center transition-transform duration-700 group-hover:scale-110" style={{ backgroundImage: `url('${getSafeUrl(novel.meta?.coverBg)}')`, filter: 'brightness(0.4)' }} />
                          <div className="absolute inset-0 bg-gradient-to-t from-black via-black/60 to-transparent" />
                          <div className="absolute bottom-0 left-0 p-5 w-full">
                            <span className="bg-red-700 text-white px-2 py-1 font-black text-[10px] uppercase tracking-widest mb-2 inline-block shadow-lg">POV: {novel.meta?.protagonist?.name || 'Unknown'}</span>
                            <span className="bg-purple-700 text-white px-2 py-1 font-black text-[10px] uppercase tracking-widest mb-2 ml-2 inline-block shadow-lg">총 {novel.stages?.length || 0}화</span>
                            <h2 className="text-xl md:text-2xl font-black mb-1 leading-tight">{novel.meta?.title || 'Untitled'}</h2>
                            <p className="text-zinc-400 text-xs md:text-sm mb-3 line-clamp-2">{novel.meta?.description || ''}</p>
                            <div className="flex items-center text-red-400 font-bold text-sm group-hover:text-white transition-colors">
                              <IconPlay size={16} className="mr-1" /> PLAY
                            </div>
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              </div>
            );
          }

          if (appState === 'HUB' && currentNovel) {
            return (
              <div className="fixed inset-0 w-full h-full bg-black text-white flex flex-col">
                <div className="absolute inset-0 bg-cover bg-center opacity-30" style={{ backgroundImage: `url('${getSafeUrl(currentNovel.meta?.coverBg)}')` }} />
                <div className="absolute inset-0 bg-black/80 backdrop-blur-md" />
                <div className="relative z-10 p-4 md:p-6 flex items-center justify-between border-b border-white/10">
                  <button onClick={() => setAppState('LIBRARY')} className="flex items-center text-zinc-400 hover:text-white font-bold transition-colors text-sm md:text-base">
                    <IconRotateCcw size={16} className="mr-2"/> 돌아가기
                  </button>
                  <div className="text-sm md:text-lg font-black tracking-widest uppercase text-red-500">{currentNovel.meta?.title || 'Unknown'}</div>
                </div>
                <div className="relative z-10 flex flex-col items-center pt-8 pb-12 px-4 overflow-y-auto flex-1 custom-scrollbar">
                  <h2 className="text-2xl md:text-4xl font-black text-white mb-2 tracking-[0.2em] uppercase text-center">Stage Selection</h2>
                  <div className="flex flex-col gap-3 md:gap-4 w-full max-w-2xl pb-10">
                    {(currentNovel.stages || []).map((st) => {
                      const borderColorClass = getColorClass(st.color, 'border');
                      const textColorClass = getColorClass(st.color, 'text');
                      
                      return (
                      <button key={st.id} disabled={!unlockedStages[st.id]} onClick={() => startStage(st.id)} className={`p-4 md:p-6 border-l-4 bg-zinc-900/80 transition-all text-left flex items-center justify-between group rounded-sm ${unlockedStages[st.id] ? `${borderColorClass} hover:bg-zinc-800 active:scale-[0.98] shadow-lg` : 'border-zinc-800 opacity-40 cursor-not-allowed'}`}>
                        <div className="flex items-center gap-3 md:gap-4">
                          <div className={`p-2 md:p-3 bg-black rounded-full shrink-0 ${unlockedStages[st.id] ? textColorClass : 'text-zinc-600'}`}>
                            {getStageIcon(st.icon)}
                          </div>
                          <div>
                            <span className="text-[10px] md:text-xs text-zinc-400 font-bold tracking-widest uppercase mb-1 block">{st.charName || '?'} ({st.role || '?'})</span>
                            <span className="text-base md:text-2xl font-black text-white">{st.title || 'Untitled Stage'}</span>
                          </div>
                        </div>
                        {unlockedStages[st.id] ? <IconPlay size={20} className={`${textColorClass} group-hover:translate-x-2 transition-transform`} /> : <IconLock size={20} className="text-zinc-600" />}
                      </button>
                      );
                    })}
                  </div>
                </div>
              </div>
            );
          }

          if (!sceneData) {
            return (
              <div className="fixed inset-0 w-full flex items-center justify-center bg-black text-white flex-col gap-4">
                 <IconShieldAlert size={48} className="text-red-500" />
                 <p>데이터 렌더링 오류: 씬 정보가 손상되었습니다.</p>
                 <button onClick={() => setAppState('HUB')} className="px-4 py-2 bg-zinc-800 rounded">허브로 돌아가기</button>
              </div>
            );
          }

          return (
            <div className="fixed inset-0 w-full flex flex-col bg-black text-white font-sans select-none overflow-hidden">
              
              {/* 배경 이미지 영역 */}
              <div className="absolute inset-0 pointer-events-none z-0">
                <img 
                    src={getSafeUrl(sceneData.bg)} 
                    style={{display: 'none'}} 
                    onLoad={() => setBgImgLoaded(true)} 
                    alt="bg-loader" 
                />
                <div 
                    className={`absolute inset-0 bg-cover bg-center transition-all duration-1000 ease-in-out scale-105 ${bgImgLoaded ? 'opacity-100' : 'opacity-0'}`} 
                    style={{ 
                        backgroundImage: `url('${getSafeUrl(sceneData.bg)}')`, 
                        filter: 'brightness(0.5) contrast(1.1)'
                    }} 
                />
                {!bgImgLoaded && sceneData.bg && (
                    <div className="absolute inset-0 bg-zinc-900 flex flex-col items-center justify-center text-zinc-600">
                        <IconImage size={48} className="animate-pulse-slow mb-4 opacity-30" />
                    </div>
                )}
                <div className="absolute inset-0 bg-gradient-to-t from-black via-transparent to-transparent" />
              </div>

              {/* 화면을 가득 채우는 캐릭터 이미지 영역 (z-10) */}
              <div className="absolute inset-0 z-10 pointer-events-none flex justify-center items-center overflow-hidden">
                {sceneData.character?.charImage ? (
                  <>
                    {!charImgLoaded && (
                        <div className="absolute inset-0 flex flex-col items-center justify-center bg-black/60 backdrop-blur-sm z-20">
                            <IconCpu size={32} className="text-red-500 animate-spin-slow mb-3" />
                            <span className="text-red-400 font-bold tracking-widest text-sm animate-pulse">실시간 AI 일러스트 생성 중...</span>
                            <span className="text-zinc-500 text-xs mt-2">약 3~10초 소요될 수 있습니다.</span>
                        </div>
                    )}
                    <img 
                      src={getSafeUrl(sceneData.character.charImage)} 
                      alt="character" 
                      className={`w-full h-full object-cover object-top transition-opacity duration-1000 ${charImgLoaded ? 'opacity-95' : 'opacity-0'}`}
                      onLoad={() => setCharImgLoaded(true)}
                    />
                    <div className="absolute top-0 left-0 w-full h-32 bg-gradient-to-b from-black/70 to-transparent" />
                  </>
                ) : (
                  <div className={`absolute inset-0 bg-gradient-to-t ${getColorClass(sceneData.character?.color, 'gradient')} to-transparent opacity-30 blur-xl`} />
                )}
              </div>

              {/* 상단 정보 UI 및 타겟 이름 (z-40) */}
              <div className="relative z-40 w-full px-2 pt-2 md:px-6 md:pt-6 shrink-0 pointer-events-none flex justify-between items-start gap-2">
                <div className="flex flex-col items-start gap-2">
                  <div className="bg-zinc-950/90 backdrop-blur-md px-3 py-2 md:px-4 md:py-3 border-l-4 border-red-600 shadow-lg shrink-0">
                    <span className="text-[8px] md:text-[10px] text-red-500 font-black tracking-widest block mb-0.5">{currentNovel.meta?.protagonist?.pov || 'POV'}</span>
                    <span className="text-sm md:text-xl font-serif font-bold italic">{currentNovel.meta?.protagonist?.name || 'Player'}</span>
                  </div>
                  {sceneData.character && sceneData.character.name && (
                    <div className={`${getColorClass(sceneData.character.color, 'bg')} text-white px-3 py-1 md:px-4 md:py-1.5 font-black skew-x-[-10deg] text-xs md:text-sm uppercase shadow-lg inline-block pointer-events-none`}>
                      <span className="skew-x-[10deg] block tracking-wide">TARGET: {sceneData.character.name}</span>
                    </div>
                  )}
                </div>
                <div className="flex gap-1 md:gap-2 flex-wrap justify-end">
                  {(currentNovel.meta?.statsConfig || []).map((sc, i) => {
                    const borderColorClass = getColorClass(sc.color, 'border');
                    const textColorClass = getColorClass(sc.color, 'text');
                    return (
                    <div key={i} className={`bg-zinc-950/90 backdrop-blur-md px-2 py-2 md:px-4 md:py-3 border-b-2 ${borderColorClass} text-center min-w-[50px] md:min-w-[80px] shadow-lg`}>
                      <div className={`text-[7px] md:text-[9px] ${textColorClass} font-black uppercase mb-0.5`}>{sc.label}</div>
                      <div className="text-xs md:text-lg font-black tabular-nums">{stats[sc.key] !== undefined ? stats[sc.key] : 0}</div>
                    </div>
                    );
                  })}
                </div>
              </div>

              {/* 하단 대화창 및 선택지 (z-40) */}
              <div className="relative z-40 w-full shrink-0 px-2 pb-4 md:px-6 md:pb-8 pt-2 pointer-events-auto flex-grow flex flex-col justify-end max-w-4xl mx-auto">
                <div className="h-[120px] w-full flex flex-col justify-end gap-2 mb-3">
                  {showActionArea && sceneData.choices && sceneData.choices.length > 0 && (
                    <div className="flex flex-col gap-2 animate-fade-in-up w-full">
                      {sceneData.choices.map((c, i) => (
                        <button key={i} onClick={(e) => { e.stopPropagation(); handleChoice(c); }} className="w-full p-3 md:p-4 bg-zinc-900/95 border border-white/20 hover:border-red-500 active:bg-red-900/40 transition-colors text-left flex items-center justify-between shadow-lg rounded-sm group">
                          <span className="text-zinc-200 font-bold text-sm md:text-base leading-snug break-keep pr-2 group-hover:text-white transition-colors">{c.text}</span>
                          <IconChevronRight size={18} className="text-red-500 shrink-0 group-hover:translate-x-1 transition-transform" />
                        </button>
                      ))}
                    </div>
                  )}
                  {showActionArea && (!sceneData.choices || sceneData.choices.length === 0) && (
                    <div className="flex flex-col gap-2 animate-fade-in-up w-full">
                      {sceneData.nextScene ? (
                        <button onClick={() => { setCurrentSceneId(sceneData.nextScene); setLineIndex(0); }} className="w-full p-3 md:p-4 bg-red-700 hover:bg-red-600 font-black text-center uppercase tracking-widest transition-colors shadow-lg rounded-sm text-sm md:text-base">
                           다음 대화로 계속하기
                        </button>
                      ) : (
                        <>
                          {hasNextStage && nextStage ? (
                             <button onClick={() => startStage(nextStage.id)} className="w-full p-3 md:p-4 bg-purple-700 hover:bg-purple-600 font-black text-center uppercase tracking-widest transition-colors shadow-lg rounded-sm text-sm md:text-base">
                               다음 에피소드 계속하기 ({nextStage.title || 'Untitled'})
                             </button>
                          ) : (
                             <div className="w-full p-3 md:p-4 bg-zinc-800 text-zinc-400 font-bold text-center tracking-widest rounded-sm text-sm md:text-base border border-zinc-700">
                               현재 연재된 마지막 에피소드입니다.
                             </div>
                          )}
                          <button onClick={handleStageEnd} className="w-full p-3 md:p-4 bg-zinc-900 border border-zinc-700 hover:bg-zinc-800 font-black text-center uppercase tracking-widest transition-colors shadow-lg rounded-sm text-sm md:text-base text-zinc-300">
                            허브로 돌아가기
                          </button>
                        </>
                      )}
                    </div>
                  )}
                </div>

                <div className="h-[32px] md:h-[36px] mb-[-4px] z-10 w-full pl-2 md:pl-0">
                  {sceneData.lines && sceneData.lines[lineIndex] && sceneData.lines[lineIndex].speaker && (
                    <div className="inline-block bg-red-700 text-white px-4 py-1 md:px-5 md:py-1.5 font-black text-sm md:text-lg skew-x-[-10deg] border-r-4 border-white shadow-lg">
                      <span className="skew-x-[10deg] block tracking-wide">{sceneData.lines[lineIndex].speaker}</span>
                    </div>
                  )}
                </div>

                <div onClick={handleBoxClick} className="bg-zinc-950/95 border-2 border-white/20 p-4 md:p-8 shadow-2xl relative flex flex-col h-[150px] md:h-[180px] w-full shrink-0 cursor-pointer rounded-sm">
                  <div className="absolute top-0 right-0 w-12 h-12 bg-red-600/10 rounded-bl-full pointer-events-none" />
                  <div ref={scrollRef} className="text-[15px] md:text-xl font-medium leading-[1.7] md:leading-[1.9] text-zinc-100 flex-grow break-keep mb-2 overflow-y-auto custom-scrollbar pr-2">
                    {displayedText}
                  </div>
                  {!isTyping && (!sceneData.choices && !sceneData.endStage && sceneData.lines && lineIndex < sceneData.lines.length - 1) && (
                    <div className="absolute bottom-4 right-4 animate-bounce"><IconChevronRight size={20} className="text-red-500" /></div>
                  )}
                </div>
              </div>
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
