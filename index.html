<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Visual Novel Engine Pro - Ultra High Quality</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.21/mammoth.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    
    <style>
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in-up { animation: fadeInUp 0.3s ease-out forwards; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .animate-spin-slow { animation: spin 2s linear infinite; }

        body { 
          margin: 0; background: #000; font-family: 'Pretendard', -apple-system, sans-serif; 
          overscroll-behavior: none; -webkit-touch-callout: none;
        }
        
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #18181b; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #dc2626; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background-color: #b91c1c; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ==========================================
        // [설정 및 아이콘]
        // ==========================================
        const IconChevronRight = ({size=24, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>;
        const IconRotateCcw = ({size=24, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><polyline points="3 3 3 8 8 8"/></svg>;
        const IconLibrary = ({size=24, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>;
        const IconPlay = ({size=24, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>;
        const IconCpu = ({size=24, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="4" y="4" width="16" height="16" rx="2" ry="2"/><rect x="9" y="9" width="6" height="6"/><line x1="9" y1="1" x2="9" y2="4"/><line x1="15" y1="1" x2="15" y2="4"/><line x1="9" y1="20" x2="9" y2="23"/><line x1="15" y1="20" x2="15" y2="23"/><line x1="20" y1="9" x2="23" y2="9"/><line x1="20" y1="14" x2="23" y2="14"/><line x1="1" y1="9" x2="4" y2="9"/><line x1="1" y1="14" x2="4" y2="14"/></svg>;
        const IconDownload = ({size=24, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>;
        const IconTrash = ({size=24, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>;

        const colorPalette = {
          red: "rgb(220, 38, 38)", blue: "rgb(37, 99, 235)", purple: "rgb(147, 51, 234)",
          green: "rgb(22, 163, 74)", yellow: "rgb(202, 138, 4)", zinc: "rgb(113, 113, 122)"
        };

        const App = () => {
          const [apiKey, setApiKey] = useState(localStorage.getItem('gemini_api_key') || "");
          const [appState, setAppState] = useState('LIBRARY');
          const [novelLibrary, setNovelLibrary] = useState([]);
          const [currentNovel, setCurrentNovel] = useState(null);
          const [unlockedStages, setUnlockedStages] = useState({});
          const [stats, setStats] = useState({});
          const [currentStageId, setCurrentStageId] = useState(null);
          const [currentSceneId, setCurrentSceneId] = useState(null);
          const [lineIndex, setLineIndex] = useState(0);
          const [displayedText, setDisplayedText] = useState("");
          const [isTyping, setIsTyping] = useState(false);
          const [rawText, setRawText] = useState("");
          const [isGenerating, setIsGenerating] = useState(false);
          const [errorMsg, setErrorMsg] = useState("");
          const [textChunks, setTextChunks] = useState([]);
          const [currentChunkIndex, setCurrentChunkIndex] = useState(0);
          const [appendTargetId, setAppendTargetId] = useState("NEW");
          const scrollRef = useRef(null);

          useEffect(() => {
            const savedLib = localStorage.getItem('novel_library_pro');
            if (savedLib) setNovelLibrary(JSON.parse(savedLib));
          }, []);

          useEffect(() => {
            if (novelLibrary.length > 0) localStorage.setItem('novel_library_pro', JSON.stringify(novelLibrary));
          }, [novelLibrary]);

          const handleApiKeySave = (val) => { setApiKey(val); localStorage.setItem('gemini_api_key', val); };

          const handleFileUpload = (event) => {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
              try {
                const parsed = JSON.parse(e.target.result);
                setNovelLibrary(prev => [parsed, ...prev]);
              } catch(e) { setRawText(e.target.result); }
            };
            reader.readAsText(file);
          };

          const handleAIGeneration = async () => {
            if (!apiKey) { showError("API Key를 입력해주세요."); return; }
            if (!rawText.trim()) { showError("텍스트를 입력해주세요."); return; }
            setIsGenerating(true);
            setErrorMsg("");

            const systemInstruction = `비주얼 노벨 엔진 데이터 생성기입니다. 
            [중요 규칙]
            1. 결과물은 반드시 순수 JSON만 출력 (마크다운 금지).
            2. 캐릭터 이미지는 소설 내용과 관계없이 반드시 '고퀄리티 미소녀/미소년 애니메이션 스타일'이어야 합니다.
            3. 이미지 URL 형식:
               - 배경: https://image.pollinations.ai/prompt/anime%20masterpiece%20visual%20novel%20background%20{묘사}?width=1280&height=720&nologo=true
               - 캐릭터: https://image.pollinations.ai/prompt/anime%20masterpiece%20high%20quality%20character%20portrait%20{묘사}?width=500&height=800&nologo=true
            4. 묘사 부분은 반드시 영어 단어로 구체적으로 작성 (예: beautiful%20girl%20office%20look).
            5. 각 씬의 choices는 2개 필수. 마지막 씬은 endStage: true 적용.`;

            try {
              const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
              const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  contents: [{ parts: [{ text: rawText }] }],
                  systemInstruction: { parts: [{ text: systemInstruction }] },
                  generationConfig: { responseMimeType: "application/json" },
                  // 안전 필터 완전히 해제 (오류 방지 핵심)
                  safetySettings: [
                    { category: "HARM_CATEGORY_HARASSMENT", threshold: "BLOCK_NONE" },
                    { category: "HARM_CATEGORY_HATE_SPEECH", threshold: "BLOCK_NONE" },
                    { category: "HARM_CATEGORY_SEXUALLY_EXPLICIT", threshold: "BLOCK_NONE" },
                    { category: "HARM_CATEGORY_DANGEROUS_CONTENT", threshold: "BLOCK_NONE" }
                  ]
                })
              });

              const data = await response.json();
              if (!data.candidates) throw new Error("API 응답이 비어있습니다. (Safety 필터링 또는 키 문제)");

              const jsonText = data.candidates[0].content.parts[0].text.trim();
              const parsedNovel = JSON.parse(jsonText);
              
              if (appendTargetId === "NEW") {
                parsedNovel.id = 'novel_' + Date.now();
                setNovelLibrary(prev => [parsedNovel, ...prev]);
              } else {
                setNovelLibrary(prev => {
                  const lib = [...prev];
                  const idx = lib.findIndex(n => n.id === appendTargetId);
                  if (idx !== -1) {
                    const target = {...lib[idx]};
                    const newStage = {...parsedNovel.stages[0], id: 'st_'+Date.now(), isUnlocked: true};
                    target.stages.push(newStage);
                    target.scenes[newStage.id] = parsedNovel.scenes[Object.keys(parsedNovel.scenes)[0]];
                    lib[idx] = target;
                  }
                  return lib;
                });
              }
              setRawText(""); alert("생성 완료!");
            } catch (err) { showError("오류: " + err.message); }
            finally { setIsGenerating(false); }
          };

          const showError = (msg) => { setErrorMsg(msg); setTimeout(() => setErrorMsg(""), 4000); };
          const loadNovel = (novel) => {
            setCurrentNovel(novel);
            const initialUnlocks = {}; novel.stages.forEach(st => initialUnlocks[st.id] = st.isUnlocked);
            setUnlockedStages(initialUnlocks);
            const initialStats = {}; novel.meta.statsConfig.forEach(sc => initialStats[sc.key] = 0);
            setStats(initialStats);
            setAppState('HUB');
          };

          const startStage = (stageId) => {
            setCurrentStageId(stageId);
            const stageScenes = currentNovel.scenes[stageId];
            setCurrentSceneId(currentNovel.stages.find(s=>s.id===stageId).firstScene || Object.keys(stageScenes)[0]);
            setLineIndex(0); setAppState('PLAY');
          };

          const sceneData = (currentNovel && currentStageId && currentSceneId) ? currentNovel.scenes[currentStageId][currentSceneId] : null;

          useEffect(() => {
            if (appState !== 'PLAY' || !sceneData) return;
            const line = sceneData.lines[lineIndex];
            if (!line) return;
            setIsTyping(true); setDisplayedText("");
            let i = 0;
            const timer = setInterval(() => {
              if (i < line.text.length) { setDisplayedText(line.text.substring(0, i+1)); i++; }
              else { clearInterval(timer); setIsTyping(false); }
            }, 30);
            return () => clearInterval(timer);
          }, [currentSceneId, lineIndex, appState]);

          const handleBoxClick = () => {
            if (isTyping) { setDisplayedText(sceneData.lines[lineIndex].text); setIsTyping(false); return; }
            if (lineIndex < sceneData.lines.length - 1) setLineIndex(prev => prev + 1);
            else if (sceneData.nextScene) { setCurrentSceneId(sceneData.nextScene); setLineIndex(0); }
          };

          const isActionPoint = !isTyping && lineIndex === (sceneData?.lines?.length - 1) && (sceneData?.choices || sceneData?.endStage);

          if (appState === 'LIBRARY') {
            return (
              <div className="fixed inset-0 w-full h-full bg-zinc-950 text-white overflow-y-auto">
                {errorMsg && <div className="fixed top-4 left-1/2 -translate-x-1/2 bg-red-600 px-6 py-3 rounded z-50 animate-fade-in-up font-bold">{errorMsg}</div>}
                <div className="max-w-4xl mx-auto py-10 px-6">
                  <div className="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
                    <h1 className="text-3xl font-black text-red-600 tracking-tighter">AI NOVEL ENGINE PRO</h1>
                    <div className="flex items-center gap-2 bg-zinc-900 p-2 rounded border border-zinc-800">
                      <span className="text-[10px] text-zinc-500 font-bold uppercase">API KEY</span>
                      <input type="password" value={apiKey} onChange={(e)=>handleApiKeySave(e.target.value)} className="bg-black border border-zinc-700 text-xs p-1 rounded outline-none w-40 focus:border-red-600"/>
                    </div>
                  </div>
                  <div className="bg-zinc-900 rounded-xl p-6 border border-zinc-800 shadow-2xl mb-10">
                    <textarea value={rawText} onChange={(e)=>setRawText(e.target.value)} placeholder="소설 원문을 입력하세요..." className="w-full h-40 bg-black border border-zinc-800 rounded p-4 text-sm mb-4 outline-none focus:border-red-600 resize-none custom-scrollbar"/>
                    <div className="flex gap-2">
                        <select value={appendTargetId} onChange={(e)=>setAppendTargetId(e.target.value)} className="flex-1 bg-zinc-800 border border-zinc-700 p-2 rounded text-xs">
                          <option value="NEW">✨ 새 게임 생성</option>
                          {novelLibrary.map(n => <option key={n.id} value={n.id}>➕ {n.meta.title}에 추가</option>)}
                        </select>
                        <button onClick={handleAIGeneration} disabled={isGenerating} className="px-8 py-2 bg-red-700 hover:bg-red-600 rounded font-black text-sm transition-all disabled:bg-zinc-800">
                          {isGenerating ? "변환 중..." : "AI 변환 시작"}
                        </button>
                    </div>
                  </div>
                  <h2 className="text-xl font-black mb-6 flex items-center gap-2"><IconLibrary size={20}/> MY NOVELS</h2>
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                    {novelLibrary.map(n => (
                      <div key={n.id} onClick={()=>loadNovel(n)} className="relative h-60 rounded-xl overflow-hidden border border-zinc-800 group cursor-pointer hover:border-red-600 transition-all shadow-xl">
                        <div className="absolute inset-0 bg-cover bg-center group-hover:scale-105 transition-all duration-500" style={{backgroundImage: `url(${n.meta.coverBg})`}}/>
                        <div className="absolute inset-0 bg-gradient-to-t from-black via-black/40 to-transparent"/>
                        <div className="absolute bottom-0 p-5">
                          <div className="text-[10px] bg-red-700 inline-block px-2 py-0.5 mb-1 font-bold">EPISODES: {n.stages.length}</div>
                          <h3 className="text-2xl font-black leading-tight">{n.meta.title}</h3>
                        </div>
                        <button onClick={(e)=>{e.stopPropagation(); if(confirm('삭제하시겠습니까?')) setNovelLibrary(prev=>prev.filter(x=>x.id!==n.id));}} className="absolute top-3 right-3 p-2 bg-black/50 hover:bg-red-600 rounded-full opacity-0 group-hover:opacity-100 transition-all"><IconTrash size={16}/></button>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            );
          }

          if (appState === 'HUB') {
            return (
              <div className="fixed inset-0 w-full h-full bg-black text-white flex flex-col">
                <div className="absolute inset-0 bg-cover bg-center opacity-40 blur-md" style={{backgroundImage: `url(${currentNovel.meta.coverBg})`}}/>
                <div className="relative z-10 p-5 border-b border-white/10 flex justify-between items-center backdrop-blur-md">
                   <button onClick={()=>setAppState('LIBRARY')} className="flex items-center gap-1 text-xs font-bold text-zinc-400 hover:text-white"><IconRotateCcw size={14}/> BACK</button>
                   <div className="font-black text-red-600 tracking-widest">{currentNovel.meta.title}</div>
                </div>
                <div className="relative z-10 flex-1 overflow-y-auto p-10 flex flex-col items-center">
                   <div className="w-full max-w-lg space-y-4">
                      {currentNovel.stages.map(st => (
                        <button key={st.id} disabled={!unlockedStages[st.id]} onClick={()=>startStage(st.id)} className="w-full p-6 bg-zinc-900/90 border-l-4 border-red-600 rounded flex justify-between items-center hover:bg-zinc-800 transition-all disabled:opacity-30">
                           <div className="text-left">
                             <div className="text-[10px] text-zinc-500 font-bold uppercase">{st.charName}</div>
                             <div className="text-xl font-black">{st.title}</div>
                           </div>
                           <IconPlay size={20} className="text-red-600"/>
                        </button>
                      ))}
                   </div>
                </div>
              </div>
            );
          }

          if (appState === 'PLAY') {
            return (
              <div className="fixed inset-0 w-full h-full bg-black text-white overflow-hidden">
                <div className="absolute inset-0 bg-cover bg-center transition-all duration-1000" style={{backgroundImage: `url(${sceneData.bg})`, filter: 'brightness(0.6)'}}/>
                <div className="absolute top-0 w-full p-6 flex justify-between items-start z-50 pointer-events-none">
                  <div className="bg-black/80 px-4 py-2 border-l-4 border-red-600">
                    <div className="text-[10px] text-red-600 font-bold uppercase">{currentNovel.meta.protagonist.pov}</div>
                    <div className="text-lg font-bold italic">{currentNovel.meta.protagonist.name}</div>
                  </div>
                </div>
                <div className="absolute inset-0 flex justify-center items-end pb-32 pointer-events-none">
                  {sceneData.character && (
                    <img src={sceneData.character.charImage} className="h-[85%] object-contain drop-shadow-[0_0_50px_rgba(0,0,0,0.8)] animate-fade-in-up"/>
                  )}
                </div>
                <div className="absolute bottom-0 w-full p-4 md:p-8 max-w-5xl left-1/2 -translate-x-1/2 z-50">
                  {isActionPoint && (
                    <div className="grid gap-2 mb-4 animate-fade-in-up">
                      {sceneData.choices?.map((c, i) => (
                        <button key={i} onClick={()=>handleChoice(c)} className="w-full p-4 bg-zinc-900/95 border border-white/10 hover:border-red-600 text-left rounded font-bold transition-all flex justify-between items-center group">
                          <span>{c.text}</span> <IconChevronRight size={18} className="text-red-600 group-hover:translate-x-1 transition-all"/>
                        </button>
                      ))}
                      {sceneData.endStage && <button onClick={()=>setAppState('HUB')} className="w-full p-4 bg-red-700 hover:bg-red-600 font-black rounded uppercase">에피소드 종료</button>}
                    </div>
                  )}
                  <div onClick={handleBoxClick} className="w-full h-40 md:h-48 bg-black/90 border-2 border-white/10 p-6 md:p-8 relative cursor-pointer rounded-sm">
                    <div className="absolute -top-4 left-6 px-6 py-1 bg-red-700 font-black skew-x-[-15deg] shadow-lg">
                      <span className="block skew-x-[15deg]">{sceneData.lines[lineIndex]?.speaker}</span>
                    </div>
                    <div className="text-base md:text-xl leading-relaxed text-zinc-100 overflow-y-auto h-full custom-scrollbar">
                      {displayedText}
                    </div>
                    {!isTyping && !isActionPoint && <div className="absolute bottom-4 right-4 animate-bounce text-red-600"><IconChevronRight/></div>}
                  </div>
                </div>
              </div>
            );
          }
          return null;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
