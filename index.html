<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Novel Reader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.21/mammoth.browser.min.js"></script>

    <style>
        @keyframes fadeIn    { from{opacity:0} to{opacity:1} }
        @keyframes fadeInUp  { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
        @keyframes blink     { 0%,100%{opacity:1} 50%{opacity:0} }
        @keyframes shimmer   { 0%{background-position:-200% center} 100%{background-position:200% center} }
        @keyframes pulse     { 0%,100%{opacity:0.4;transform:scale(1)} 50%{opacity:0.75;transform:scale(1.04)} }
        @keyframes bgFade    { from{opacity:0} to{opacity:1} }

        * { box-sizing:border-box; }
        body {
            margin:0; background:#000;
            font-family:'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif;
            overscroll-behavior:none;
            -webkit-user-select:none; user-select:none;
        }
        .fade-in     { animation:fadeIn 0.6s ease forwards; }
        .fade-in-up  { animation:fadeInUp 0.4s ease forwards; }
        .cursor-blink{ animation:blink 0.8s step-end infinite; }

        .vn-scroll::-webkit-scrollbar { width:3px; }
        .vn-scroll::-webkit-scrollbar-track { background:transparent; }
        .vn-scroll::-webkit-scrollbar-thumb { background:rgba(220,38,38,0.5); border-radius:2px; }

        .text-shimmer {
            background:linear-gradient(90deg,#ef4444,#fca5a5,#ef4444);
            background-size:200% auto;
            -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
            animation:shimmer 2s linear infinite;
        }

        /* 대화창 완전 고정 */
        .dialog-fixed {
            position:absolute; bottom:0; left:0; right:0; z-index:50;
            padding:0 12px 18px;
        }
        @media(min-width:768px){ .dialog-fixed{ padding:0 32px 28px; } }

        .dialog-box {
            background:rgba(4,4,4,0.93);
            border:1.5px solid rgba(255,255,255,0.12);
            border-top:1.5px solid rgba(255,255,255,0.2);
            border-radius:18px;
            backdrop-filter:blur(16px);
            box-shadow:0 -8px 60px rgba(0,0,0,0.7);
            overflow:hidden;
        }

        .dialog-text {
            height:108px;
            overflow-y:auto;
            padding:8px 22px 4px;
            cursor:pointer;
        }
        @media(min-width:768px){ .dialog-text{ height:128px; } }

        /* 몰입 모드 - UI 숨김 */
        .immersive .hide-ui { opacity:0; pointer-events:none; transition:opacity 0.4s; }
        .immersive .dialog-box {
            background:rgba(0,0,0,0.7);
            border-color:transparent;
            box-shadow:none;
        }

        .speaker-tag {
            display:inline-block;
            background:#dc2626;
            color:#fff;
            font-size:12px; font-weight:900;
            padding:4px 18px 4px 14px;
            margin:10px 0 0 14px;
            clip-path:polygon(0 0,calc(100% - 8px) 0,100% 50%,calc(100% - 8px) 100%,0 100%);
            transition:opacity 0.3s;
        }

        /* 속도 버튼 */
        .speed-btn {
            background:rgba(0,0,0,0.6);
            border:1px solid rgba(255,255,255,0.15);
            border-radius:999px;
            color:#fff;
            font-size:11px; font-weight:900;
            padding:4px 10px;
            cursor:pointer;
            transition:background 0.2s;
        }
        .speed-btn:hover { background:rgba(220,38,38,0.4); }
        .speed-btn.active { background:#dc2626; border-color:#dc2626; }
    </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

/* ── 아이콘 ── */
const Svg = ({d,size=20,cls=""}) =>
    <svg width={size} height={size} className={cls} viewBox="0 0 24 24" fill="none"
         stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d={d}/>
    </svg>;
const IcoChevron = ({s,c}) => <Svg size={s} cls={c} d="M9 18l6-6-6-6"/>;
const IcoBack    = ({s,c}) => <Svg size={s} cls={c} d="M19 12H5M12 19l-7-7 7-7"/>;
const IcoPlay    = ({s,c}) => <svg width={s||18} height={s||18} className={c} viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>;
const IcoPause   = ({s,c}) => <svg width={s||18} height={s||18} className={c} viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>;
const IcoEye     = ({s,c}) => <Svg size={s} cls={c} d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8zM12 9a3 3 0 100 6 3 3 0 000-6z"/>;
const IcoUpload  = ({s,c}) => <Svg size={s} cls={c} d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/>;
const IcoBook    = ({s,c}) => <Svg size={s} cls={c} d="M4 19.5A2.5 2.5 0 016.5 17H20M4 19.5A2.5 2.5 0 014 17V5a2 2 0 012-2h14v14H6.5A2.5 2.5 0 004 19.5z"/>;
const IcoTrash   = ({s,c}) => <Svg size={s} cls={c} d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>;
const IcoDl      = ({s,c}) => <Svg size={s} cls={c} d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/>;
const IcoZap     = ({s,c}) => <svg width={s||18} height={s||18} className={c} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>;

/* ══ 감정 감지 → 분위기 필터 ══ */
const MOOD_KEYWORDS = {
    romance:  ['좋아','사랑','설레','두근','마음','고백','키스','손잡','눈빛','보고싶','그리워','예쁘','반해','설렘'],
    intimate: ['가까이','안아','따뜻','향기','떨려','단둘이','조용히','숨소리','심장','뜨거','포근','부드럽'],
    sad:      ['울고','슬프','힘들','눈물','아프','외로','미안','후회','그립','쓸쓸','상처'],
    tension:  ['화가','싫어','배신','거짓말','멈춰','짜증','비밀','위험','이상해','수상'],
    excited:  ['드디어','결국','대박','설마','해냈','성공','믿어지지','정말로'],
};
const MOOD_STYLE = {
    romance:  { filter:'brightness(0.4) sepia(0.35) hue-rotate(-10deg) saturate(1.2)', tint:'rgba(255,160,130,0.07)' },
    intimate: { filter:'brightness(0.32) sepia(0.4) hue-rotate(-20deg)',               tint:'rgba(255,140,100,0.09)' },
    sad:      { filter:'brightness(0.3) hue-rotate(185deg) saturate(0.75)',            tint:'rgba(80,130,255,0.07)'  },
    tension:  { filter:'brightness(0.28) contrast(1.25) saturate(0.85)',               tint:'rgba(220,38,38,0.07)'   },
    excited:  { filter:'brightness(0.42) saturate(1.35)',                              tint:'rgba(255,210,50,0.05)'  },
    default:  { filter:'brightness(0.35)',                                             tint:'transparent'            },
};
function detectMood(lines) {
    const text = (lines||[]).map(l=>l.text).join(' ');
    let best='default', bestScore=0;
    for (const [mood, words] of Object.entries(MOOD_KEYWORDS)) {
        const score = words.filter(w=>text.includes(w)).length;
        if (score>bestScore) { bestScore=score; best=mood; }
    }
    return best;
}

/* ══ 배경 URL ══ */
const BG_POOL = [
    "anime visual novel background luxury apartment night city rain",
    "anime visual novel background dark office late night lamp warm",
    "anime visual novel background rooftop city sunset golden hour",
    "anime visual novel background cafe rainy window bokeh lights",
    "anime visual novel background bedroom moonlight soft curtain",
    "anime visual novel background school hallway empty afternoon",
    "anime visual novel background park cherry blossom romantic evening",
    "anime visual novel background bar neon lights night atmospheric",
    "anime visual novel background library candlelight warm shadow",
    "anime visual novel background beach sunset twilight calm waves",
];
const bgUrl = (i) => `https://image.pollinations.ai/prompt/${encodeURIComponent(BG_POOL[i%BG_POOL.length])}?width=1280&height=720&nologo=true&seed=${i*41+3}`;

/* ══ 캐릭터 이미지 ══ */
const CHAR_PROMPTS = [
    'kawaii anime girl smiling cute','pretty anime girl long hair gentle',
    'cute anime schoolgirl happy','elegant anime girl silver hair calm',
    'anime girl soft expression warm eyes','beautiful anime girl reading book',
];
const charUrl = (i) => `https://image.pollinations.ai/prompt/${encodeURIComponent(CHAR_PROMPTS[i%CHAR_PROMPTS.length])}?model=turbo&width=300&height=480&nologo=true&seed=${i*113+7}`;

function preloadImages(novel) {
    try {
        const sid = novel.stages[0]?.id;
        if (!sid) return;
        Object.values(novel.scenes[sid]||{}).forEach(sc => {
            if (sc.bg)  { const i=new Image(); i.src=sc.bg; }
            if (sc.charImg) { const i=new Image(); i.src=sc.charImg; }
        });
    } catch(e){}
}

/* ══ 파서: 선택지 없음, 순수 선형 ══ */
function parseNovel(rawText, title='') {
    const lines = rawText.split('\n').map(l=>l.trim()).filter(l=>l.length>2);

    const dlines = lines.map(line => {
        const m = line.match(/^([^:：]{1,12})[：:]\s*(.+)$/);
        if (m) return { speaker:m[1].trim(), text:m[2].trim() };
        if (line.startsWith('"')||line.startsWith('"')||line.startsWith("'")) return { speaker:'???', text:line };
        return { speaker:'서술', text:line };
    });

    const LPS = Math.max(3, Math.min(6, Math.floor(dlines.length/5)));
    const segs = [];
    for (let i=0; i<dlines.length; i+=LPS) segs.push(dlines.slice(i,i+LPS));

    const stageId = 'stage_'+Date.now();
    const ts = Date.now();
    const scenes = {};

    segs.forEach((seg, i) => {
        const isLast = i===segs.length-1;
        const mood = detectMood(seg);
        scenes[`scene_${i}`] = {
            bg:      bgUrl(i),
            charImg: charUrl(i),
            lines:   seg,
            mood,
            nextScene: isLast ? null : `scene_${i+1}`,
            isLast,
        };
    });

    return {
        id: 'novel_'+ts,
        meta: {
            title: title||`스토리 (${new Date().toLocaleTimeString()})`,
            coverBg: bgUrl(0),
            description: `${segs.length}개 장면`,
            protagonist: { name:'', pov:'' },
            statsConfig:[],
        },
        stages:[{ id:stageId, title:'제 1화', firstScene:'scene_0', isUnlocked:true }],
        scenes:{ [stageId]: scenes },
        _sceneCount: segs.length,
    };
}

/* ══ 캐릭터 이미지 컴포넌트 ══ */
const CharImage = ({ src }) => {
    const [loaded, setLoaded] = useState(false);
    const [err,    setErr]    = useState(false);
    useEffect(()=>{ setLoaded(false); setErr(false); },[src]);

    return (
        <div style={{position:'absolute',inset:0,zIndex:10,pointerEvents:'none'}}>
            {!loaded && (
                <div style={{
                    position:'absolute', bottom:0, left:'50%', transform:'translateX(-50%)',
                    width:'55%', height:'78%',
                    background:'radial-gradient(ellipse at 50% 35%, rgba(220,38,38,0.08) 0%, transparent 65%)',
                    borderRadius:'48% 48% 0 0',
                    animation:'pulse 2s ease-in-out infinite',
                }}/>
            )}
            {!err && (
                <img src={src} alt=""
                    onLoad={()=>setLoaded(true)}
                    onError={()=>setErr(true)}
                    style={{
                        position:'absolute', inset:0, width:'100%', height:'100%',
                        objectFit:'cover', objectPosition:'top center',
                        opacity: loaded?0.9:0, transition:'opacity 1.2s ease',
                    }}
                />
            )}
            <div style={{
                position:'absolute', bottom:0, left:0, right:0, height:'48%',
                background:'linear-gradient(to top,#000 0%,rgba(0,0,0,0.5) 45%,transparent 100%)',
                zIndex:1,
            }}/>
        </div>
    );
};

/* ══ 메인 앱 ══ */
const App = () => {
    const [screen,    setScreen]    = useState('LIBRARY');
    const [library,   setLibrary]   = useState([]);
    const [novel,     setNovel]     = useState(null);
    const [rawText,   setRawText]   = useState('');
    const [titleIn,   setTitleIn]   = useState('');
    const [appendTo,  setAppendTo]  = useState('NEW');

    const [stageId,   setStageId]   = useState(null);
    const [sceneId,   setSceneId]   = useState(null);
    const [lineIdx,   setLineIdx]   = useState(0);
    const [displayed, setDisplayed] = useState('');
    const [typing,    setTyping]    = useState(false);

    // 독서 모드 상태
    const [autoPlay,  setAutoPlay]  = useState(false);
    const [speed,     setSpeed]     = useState(1);    // 0.5=느리게 1=보통 2=빠르게
    const [immersive, setImmersive] = useState(false); // 몰입 모드
    const [fontSize,  setFontSize]  = useState(16);   // 글자 크기

    const timerRef   = useRef(null);
    const autoRef    = useRef(null);
    const textRef    = useRef(null);

    /* ── 저장 ── */
    useEffect(()=>{
        try{ const s=localStorage.getItem('novel_library_local'); if(s) setLibrary(JSON.parse(s)); }catch(e){}
    },[]);
    useEffect(()=>{
        try{ localStorage.setItem('novel_library_local', JSON.stringify(library)); }catch(e){}
    },[library]);

    /* ── 파일 업로드 ── */
    const handleFile = (e) => {
        const file=e.target.files[0]; if(!file) return;
        const ext=file.name.split('.').pop().toLowerCase();
        if(ext==='txt'){
            const r=new FileReader(); r.onload=ev=>setRawText(ev.target.result); r.readAsText(file);
        } else if(ext==='docx'){
            const r=new FileReader();
            r.onload=async ev=>{ const res=await mammoth.extractRawText({arrayBuffer:ev.target.result}); setRawText(res.value); };
            r.readAsArrayBuffer(file);
        } else if(ext==='json'){
            const r=new FileReader();
            r.onload=ev=>{ try{ const d=JSON.parse(ev.target.result); setLibrary(prev=>[d,...prev]); }catch(e){alert('JSON 오류');} };
            r.readAsText(file);
        }
        e.target.value=null;
    };

    /* ── 생성 ── */
    const handleGenerate = () => {
        if(!rawText.trim()){ alert('텍스트를 입력해주세요.'); return; }
        const n = parseNovel(rawText, titleIn.trim());
        if(appendTo==='NEW'){
            setLibrary(prev=>[n,...prev]);
            setRawText(''); setTitleIn(''); setAppendTo('NEW');
            playNovel(n);
        } else {
            setLibrary(prev=>{
                const lib=[...prev];
                const idx=lib.findIndex(x=>x.id===appendTo);
                if(idx!==-1){
                    const target=JSON.parse(JSON.stringify(lib[idx]));
                    const newStageId='stage_'+Date.now();
                    const newStage={...n.stages[0], id:newStageId, title:`제 ${target.stages.length+1}화`};
                    target.stages.push(newStage);
                    target.scenes[newStageId]=n.scenes[n.stages[0].id];
                    lib[idx]=target;
                }
                return lib;
            });
            setRawText(''); setTitleIn(''); setAppendTo('NEW');
            alert('에피소드가 추가되었습니다!');
        }
    };

    const exportNovel=(e,n)=>{ e.stopPropagation(); const a=document.createElement('a'); a.href='data:text/json;charset=utf-8,'+encodeURIComponent(JSON.stringify(n,null,2)); a.download=`${n.meta.title}.json`; a.click(); };
    const deleteNovel=(e,id)=>{ e.stopPropagation(); if(confirm('삭제하시겠습니까?')) setLibrary(prev=>prev.filter(x=>x.id!==id)); };

    const playNovel = (n) => {
        setNovel(n); setImmersive(false); setAutoPlay(false);
        const sid=n.stages[0].id;
        setStageId(sid); setSceneId(n.stages[0].firstScene); setLineIdx(0); setScreen('PLAY');
        setTimeout(()=>preloadImages(n), 200);
    };

    const sceneData = (novel&&stageId&&sceneId) ? novel.scenes[stageId]?.[sceneId] : null;
    const mood = sceneData ? (sceneData.mood||'default') : 'default';
    const moodStyle = MOOD_STYLE[mood] || MOOD_STYLE.default;

    /* ── 타이핑 효과 ── */
    useEffect(()=>{
        if(screen!=='PLAY'||!sceneData) return;
        const line=sceneData.lines[lineIdx]; if(!line) return;
        setTyping(true); setDisplayed(''); let i=0;
        const ms = Math.floor(22/speed); // 속도 반영
        timerRef.current=setInterval(()=>{
            if(i<line.text.length){ setDisplayed(line.text.substring(0,++i)); }
            else{ clearInterval(timerRef.current); setTyping(false); }
        }, ms);
        return ()=>clearInterval(timerRef.current);
    },[sceneId,lineIdx,screen,speed]);

    useEffect(()=>{
        if(textRef.current) textRef.current.scrollTop=textRef.current.scrollHeight;
    },[displayed]);

    const isAtEnd = !typing && sceneData?.lines && lineIdx===sceneData.lines.length-1;

    /* ── 자동 넘김 ── */
    useEffect(()=>{
        clearTimeout(autoRef.current);
        if(!autoPlay||!isAtEnd||screen!=='PLAY') return;
        // 줄 끝에서 대기 후 자동 진행
        const delay = sceneData?.isLast ? 0 : Math.floor(2800/speed);
        autoRef.current = setTimeout(()=>advance(), delay);
        return ()=>clearTimeout(autoRef.current);
    },[autoPlay, isAtEnd, sceneId, lineIdx, speed, screen]);

    const advance = useCallback(()=>{
        if(screen!=='PLAY'||!sceneData) return;
        if(typing){
            clearInterval(timerRef.current);
            setDisplayed(sceneData.lines[lineIdx].text);
            setTyping(false); return;
        }
        if(lineIdx<sceneData.lines.length-1){
            setLineIdx(l=>l+1);
        } else if(sceneData.nextScene){
            setSceneId(sceneData.nextScene); setLineIdx(0);
        }
    },[typing, lineIdx, sceneData, screen]);

    /* ── LIBRARY ── */
    if(screen==='LIBRARY') return (
        <div className="fixed inset-0 bg-zinc-950 text-white overflow-y-auto vn-scroll">
            <div className="max-w-4xl mx-auto px-4 py-10 pb-20">

                <div className="flex items-center gap-3 mb-8">
                    <IcoBook s={28} c="text-red-500 shrink-0"/>
                    <h1 className="text-3xl font-black uppercase tracking-widest text-shimmer">Novel Reader</h1>
                </div>

                {/* 변환기 */}
                <div className="bg-zinc-900 border border-zinc-800 rounded-2xl overflow-hidden mb-10 shadow-2xl">
                    <div className="flex items-center justify-between px-5 py-3 bg-zinc-800/80 border-b border-zinc-700 flex-wrap gap-2">
                        <div className="flex items-center gap-2 text-sm font-bold text-green-400">
                            <IcoZap s={15}/> 소설 → 비주얼노벨 변환기
                        </div>
                        <label className="flex items-center gap-1.5 text-xs text-zinc-300 hover:text-white cursor-pointer bg-zinc-700 hover:bg-zinc-600 px-3 py-1.5 rounded-lg transition-colors">
                            <input type="file" accept=".txt,.docx,.json" onChange={handleFile} className="hidden"/>
                            <IcoUpload s={13}/> 파일 불러오기
                        </label>
                    </div>
                    <div className="p-5">
                        <input value={titleIn} onChange={e=>setTitleIn(e.target.value)}
                            placeholder="제목 (선택사항)"
                            className="w-full bg-black/50 border border-zinc-700 focus:border-red-500 rounded-xl px-4 py-2.5 text-sm text-white outline-none mb-3 transition-colors"/>
                        <textarea value={rawText} onChange={e=>setRawText(e.target.value)}
                            placeholder={"소설, 대화문, 시나리오 등 붙여넣으세요.\n\n'화자: 대사' 형식으로 화자가 자동 인식됩니다.\n분위기(로맨스/슬픔/긴장)에 따라 배경 색조가 자동 변환됩니다."}
                            className="w-full h-48 bg-black/50 border border-zinc-700 focus:border-red-500 rounded-xl p-4 text-sm text-zinc-300 outline-none vn-scroll resize-none transition-colors mb-4"/>
                        <select value={appendTo} onChange={e=>setAppendTo(e.target.value)}
                            className="w-full bg-zinc-800 border border-zinc-700 text-sm font-bold p-3 rounded-xl outline-none focus:border-red-500 mb-3 text-white">
                            <option value="NEW">✨ 새로운 게임으로 생성 (1화)</option>
                            {library.map(n=>(
                                <option key={n.id} value={n.id}>➕ {n.meta.title}에 누적 저장 (현재 {n.stages.length}화)</option>
                            ))}
                        </select>
                        <button onClick={handleGenerate}
                            className="w-full py-3.5 bg-red-700 hover:bg-red-600 active:scale-[0.98] rounded-xl font-black tracking-widest uppercase text-sm flex items-center justify-center gap-2 transition-all shadow-lg">
                            <IcoZap s={17}/> 변환하기
                        </button>
                    </div>
                </div>

                {/* MY NOVELS */}
                <h2 className="text-xl font-black mb-6 tracking-widest border-l-4 border-red-600 pl-3">MY NOVELS</h2>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                    {library.map(n=>(
                        <div key={n.id} onClick={()=>playNovel(n)}
                            className="group relative h-60 bg-zinc-900 border border-zinc-800 rounded-2xl overflow-hidden cursor-pointer hover:border-red-600 transition-all shadow-xl">
                            <div className="absolute inset-0 bg-cover bg-center transition-transform duration-700 group-hover:scale-110"
                                style={{backgroundImage:`url(${n.meta.coverBg})`,filter:'brightness(0.45)'}}/>
                            <div className="absolute inset-0 bg-gradient-to-t from-black via-black/50 to-transparent"/>
                            <div className="absolute top-3 right-3 flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                                <button onClick={e=>exportNovel(e,n)} className="p-2 bg-black/60 hover:bg-white hover:text-black text-white rounded-full shadow-lg transition-colors"><IcoDl s={13}/></button>
                                <button onClick={e=>deleteNovel(e,n.id)} className="p-2 bg-black/60 hover:bg-red-600 text-white rounded-full shadow-lg transition-colors"><IcoTrash s={13}/></button>
                            </div>
                            <div className="absolute bottom-0 left-0 p-5 w-full">
                                <span className="bg-red-700 text-white px-2 py-0.5 font-black text-[9px] uppercase tracking-widest rounded-sm mr-1">총 {n.stages.length}화</span>
                                <span className="bg-zinc-700 text-zinc-300 px-2 py-0.5 font-black text-[9px] uppercase tracking-widest rounded-sm">{n._sceneCount||0}개 장면</span>
                                <h3 className="text-xl font-black mt-2 leading-tight">{n.meta.title}</h3>
                            </div>
                        </div>
                    ))}
                    {library.length===0 && (
                        <div className="col-span-full py-20 text-center text-zinc-700 font-bold border-2 border-dashed border-zinc-800 rounded-2xl">
                            생성된 작품이 없습니다
                        </div>
                    )}
                </div>
            </div>
        </div>
    );

    /* ══ PLAY ══ */
    if(screen==='PLAY' && sceneData){
        const currentLine = sceneData.lines[lineIdx];
        const isNarration = currentLine?.speaker==='서술';
        const totalScenes = novel.stages[0] && Object.keys(novel.scenes[stageId]||{}).filter(k=>!k.includes('_')).length;
        const currentSceneNum = parseInt((sceneId||'').replace('scene_','')) || 0;
        const progress = totalScenes ? (currentSceneNum / totalScenes) * 100 : 0;

        return (
            <div className={`fixed inset-0 bg-black text-white overflow-hidden select-none${immersive?' immersive':''}`}
                 style={{transition:'all 0.4s'}}>

                {/* 배경 - 감정 필터 적용 */}
                <div className="absolute inset-0 z-0">
                    <div key={mood} className="absolute inset-0 bg-cover bg-center fade-in"
                        style={{backgroundImage:`url(${sceneData.bg})`, filter:moodStyle.filter, transition:'filter 1.5s ease'}}/>
                    {/* 감정 색조 오버레이 */}
                    <div className="absolute inset-0" style={{background:moodStyle.tint, transition:'background 1.5s ease'}}/>
                    <div className="absolute inset-0 bg-gradient-to-b from-black/25 via-transparent to-black/65"/>
                </div>

                {/* 캐릭터 */}
                <CharImage key={sceneId} src={sceneData.charImg}/>

                {/* ── 상단 HUD ── */}
                <div className="hide-ui absolute top-0 left-0 right-0 z-50 px-4 pt-4 flex items-center justify-between">
                    <button onClick={()=>setScreen('LIBRARY')}
                        className="flex items-center gap-1.5 text-xs text-zinc-400 hover:text-white bg-black/50 backdrop-blur-sm px-3 py-1.5 rounded-full border border-zinc-700/50 transition-colors">
                        <IcoBack s={12}/> 나가기
                    </button>

                    <div className="flex items-center gap-2">
                        {/* 글자 크기 */}
                        <button onClick={()=>setFontSize(f=>f<=14?16:f<=16?19:14)}
                            className="speed-btn text-zinc-300">
                            가{fontSize===14?'↑':fontSize===16?'↑↑':'↓'}
                        </button>

                        {/* 속도 */}
                        {['🐢','🚶','🏃'].map((icon,i)=>{
                            const spd=[0.5,1,2][i];
                            return <button key={i} onClick={()=>setSpeed(spd)}
                                className={`speed-btn${speed===spd?' active':''}`}>{icon}</button>;
                        })}

                        {/* 자동 넘김 */}
                        <button onClick={()=>setAutoPlay(p=>!p)}
                            className={`speed-btn flex items-center gap-1${autoPlay?' active':''}`}>
                            {autoPlay ? <IcoPause s={11}/> : <IcoPlay s={11}/>}
                            {autoPlay?'정지':'자동'}
                        </button>

                        {/* 몰입 모드 */}
                        <button onClick={()=>setImmersive(p=>!p)}
                            className={`speed-btn${immersive?' active':''}`}>
                            <IcoEye s={13}/>
                        </button>
                    </div>
                </div>

                {/* 진행 바 */}
                <div className="hide-ui absolute left-0 right-0 z-50" style={{top:'52px'}}>
                    <div style={{height:'2px', background:'rgba(255,255,255,0.06)'}}>
                        <div style={{height:'100%', width:`${progress}%`, background:'#dc2626', transition:'width 0.6s ease'}}/>
                    </div>
                </div>

                {/* ── 대화창 ── */}
                <div className="dialog-fixed">
                    <div className="dialog-box" onClick={advance}>

                        {/* 화자 태그 - 서술은 숨김 */}
                        <div className="speaker-tag" style={{opacity: isNarration?0:1}}>
                            {currentLine?.speaker||'???'}
                        </div>

                        {/* 텍스트 고정 영역 */}
                        <div ref={textRef} className="dialog-text vn-scroll">
                            <p style={{
                                fontSize: `${fontSize}px`,
                                lineHeight:'1.9',
                                color: isNarration ? '#c8c8cc' : '#f4f4f5',
                                fontWeight: isNarration ? 400 : 500,
                                fontStyle: isNarration ? 'normal' : 'normal',
                                wordBreak:'keep-all', margin:0,
                                letterSpacing: isNarration ? '0.02em' : '0',
                            }}>
                                {displayed}
                                {typing && <span className="cursor-blink" style={{color:'#dc2626'}}>█</span>}
                            </p>
                        </div>

                        {/* 하단 힌트 */}
                        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'2px 18px 10px'}}>
                            <span style={{fontSize:'9px',color:'rgba(255,255,255,0.2)',fontWeight:700,letterSpacing:'0.1em'}}>
                                {lineIdx+1} / {sceneData.lines.length}
                                {autoPlay && <span style={{marginLeft:'6px',color:'#dc2626'}}>● AUTO</span>}
                            </span>
                            {!typing && !sceneData.isLast && (
                                <span style={{fontSize:'10px',color:'rgba(255,255,255,0.25)',display:'flex',alignItems:'center',gap:'3px'}}>
                                    {autoPlay ? '' : '탭하여 계속'}
                                    {!autoPlay && <IcoChevron s={11} c="text-red-600"/>}
                                </span>
                            )}
                            {sceneData.isLast && isAtEnd && (
                                <button onClick={()=>setScreen('LIBRARY')}
                                    style={{fontSize:'11px',color:'#f472b6',fontWeight:900,letterSpacing:'0.08em',background:'none',border:'none',cursor:'pointer'}}>
                                    완독 ✦
                                </button>
                            )}
                        </div>
                    </div>
                </div>

                {/* 몰입 모드 - 화면 탭으로 UI 다시 표시 */}
                {immersive && (
                    <div className="absolute inset-0 z-40" onClick={advance}
                        onDoubleClick={()=>setImmersive(false)}/>
                )}
            </div>
        );
    }

    return <div className="fixed inset-0 bg-black flex items-center justify-center text-zinc-600">로딩 중...</div>;
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
