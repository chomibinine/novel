<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Visual Novel Engine - Auto Branch</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.21/mammoth.browser.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;700;900&display=swap');

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes blink {
            0%, 100% { opacity: 1; } 50% { opacity: 0; }
        }
        @keyframes shimmer {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }
        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100vh); }
        }

        * { box-sizing: border-box; }
        body {
            margin: 0;
            background: #0a0a0a;
            font-family: 'Noto Sans KR', sans-serif;
            overscroll-behavior: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        .serif { font-family: 'Noto Serif KR', serif; }

        .animate-fade-in-up { animation: fadeInUp 0.4s ease-out forwards; }
        .cursor-blink { animation: blink 0.8s step-end infinite; }

        .vn-scrollbar::-webkit-scrollbar { width: 3px; }
        .vn-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .vn-scrollbar::-webkit-scrollbar-thumb { background: rgba(220,38,38,0.5); border-radius: 2px; }

        .choice-btn {
            position: relative;
            overflow: hidden;
            transition: all 0.2s ease;
        }
        .choice-btn::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 3px;
            background: #dc2626;
            transform: scaleY(0);
            transition: transform 0.2s ease;
            transform-origin: bottom;
        }
        .choice-btn:hover::before { transform: scaleY(1); }
        .choice-btn:hover { padding-left: 20px; background: rgba(220,38,38,0.08); }
        .choice-btn:active { transform: scale(0.98); }

        .scanline-overlay {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: rgba(255,255,255,0.03);
            pointer-events: none;
            z-index: 9999;
            animation: scanline 4s linear infinite;
        }

        .text-shimmer {
            background: linear-gradient(90deg, #ef4444, #fca5a5, #ef4444);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 2s linear infinite;
        }

        .noise-bg::after {
            content: '';
            position: absolute;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            opacity: 0.4;
        }

        .dialog-box {
            background: linear-gradient(135deg, rgba(10,10,10,0.97) 0%, rgba(20,10,10,0.97) 100%);
            border: 1px solid rgba(220,38,38,0.2);
            border-top: 1px solid rgba(220,38,38,0.4);
            box-shadow: 0 -20px 60px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.05);
        }

        .speaker-tag {
            background: #dc2626;
            clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 50%, calc(100% - 8px) 100%, 0 100%);
            padding-right: 16px;
        }

        .branch-badge {
            background: linear-gradient(135deg, #7c3aed, #4f46e5);
            font-size: 9px;
            letter-spacing: 0.15em;
        }

        .progress-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: rgba(220,38,38,0.3);
            transition: all 0.3s;
        }
        .progress-dot.active {
            background: #dc2626;
            box-shadow: 0 0 6px rgba(220,38,38,0.8);
        }
        .progress-dot.done {
            background: rgba(220,38,38,0.6);
        }
    </style>
</head>
<body>
<div class="scanline-overlay"></div>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

/* ──────────────────────────────────────────────
   SVG 아이콘
────────────────────────────────────────────── */
const Ico = ({ d, size=20, cls="" }) => (
    <svg width={size} height={size} className={cls} viewBox="0 0 24 24" fill="none"
         stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d={d}/>
    </svg>
);
const IcoChevron   = ({size,cls}) => <Ico size={size} cls={cls} d="M9 18l6-6-6-6"/>;
const IcoPlay      = ({size,cls}) => <svg width={size||20} height={size||20} className={cls} viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>;
const IcoUpload    = ({size,cls}) => <Ico size={size} cls={cls} d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/>;
const IcoZap       = ({size,cls}) => <svg width={size||20} height={size||20} className={cls} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>;
const IcoBack      = ({size,cls}) => <Ico size={size} cls={cls} d="M19 12H5M12 19l-7-7 7-7"/>;
const IcoTrash     = ({size,cls}) => <Ico size={size} cls={cls} d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>;
const IcoBook      = ({size,cls}) => <Ico size={size} cls={cls} d="M4 19.5A2.5 2.5 0 016.5 17H20M4 19.5A2.5 2.5 0 014 17V5a2 2 0 012-2h14v14H6.5A2.5 2.5 0 004 19.5z"/>;
const IcoShuffle   = ({size,cls}) => <Ico size={size} cls={cls} d="M16 3h5v5M4 20L21 3M21 16v5h-5M15 15l6 6M4 4l5 5"/>;

/* ──────────────────────────────────────────────
   자동 분기 파서 (핵심 로직)
────────────────────────────────────────────── */

// 선택지 뱅크 - 다양한 상황의 선택지 쌍
const CHOICE_BANKS = [
    [
        { text: "적극적으로 행동한다", mood: "bold" },
        { text: "신중하게 지켜본다", mood: "cautious" }
    ],
    [
        { text: "솔직하게 말한다", mood: "honest" },
        { text: "적당히 둘러댄다", mood: "evasive" }
    ],
    [
        { text: "가까이 다가간다", mood: "close" },
        { text: "거리를 유지한다", mood: "distant" }
    ],
    [
        { text: "감정을 드러낸다", mood: "emotional" },
        { text: "냉정함을 유지한다", mood: "calm" }
    ],
    [
        { text: "직접 물어본다", mood: "direct" },
        { text: "혼자 생각한다", mood: "introspective" }
    ],
    [
        { text: "동의한다", mood: "agree" },
        { text: "반박한다", mood: "disagree" }
    ],
    [
        { text: "도움을 청한다", mood: "help" },
        { text: "스스로 해결한다", mood: "solo" }
    ],
    [
        { text: "믿어보기로 한다", mood: "trust" },
        { text: "한 발 물러선다", mood: "retreat" }
    ],
];

// 분기 후 이어지는 반응 대사 생성
const BRANCH_REACTIONS = {
    bold:    ["그 결정이 모든 것을 바꾸었다.", "망설임 없는 행동이었다.", "순간, 흐름이 달라지기 시작했다."],
    cautious:["잠시 멈추고 상황을 살폈다.", "침묵 속에서도 많은 것이 읽혔다.", "조용한 관찰이 답을 가져왔다."],
    honest:  ["말이 나오자마자 공기가 바뀌었다.", "진심은 언제나 무언가를 건드린다.", "거짓 없는 말이 오히려 더 날카로웠다."],
    evasive: ["적당한 거리는 때로 현명하다.", "모든 걸 말할 필요는 없었다.", "침묵이 가장 많은 것을 말할 때도 있다."],
    close:   ["그 거리가 줄어들 때 심장이 빨라졌다.", "가까워질수록 보이는 것들이 있었다.", "두 사람 사이의 공기가 달랐다."],
    distant: ["거리를 두는 것도 하나의 선택이었다.", "멀리서 바라보는 시선이 더 많은 걸 담았다.", "적당한 간격이 오히려 선명하게 만들었다."],
    emotional:["감정이 터져나왔다. 억누를 수 없었다.", "마음이 앞서는 순간이 있다.", "감정은 거짓말을 하지 않는다."],
    calm:    ["내면의 파도를 다스렸다.", "흔들리지 않는 것처럼 보였다.", "냉정함 아래 무언가 끓고 있었다."],
    direct:  ["정면으로 물었다. 대답은 예상 밖이었다.", "직접적인 질문이 벽을 허물었다.", "돌아온 대답은 많은 것을 담고 있었다."],
    introspective:["혼자 생각하는 시간이 필요했다.", "내면으로 들어가 답을 찾기로 했다.", "고요한 생각 속에 실마리가 있었다."],
    agree:   ["동의하는 순간, 연결이 생겨났다.", "같은 방향을 바라보는 느낌이었다.", "의외로 그 말이 옳다는 걸 인정했다."],
    disagree:["반박했다. 긴장감이 흘렀다.", "다른 생각은 충돌을 만들기도 한다.", "마찰이 오히려 더 많은 것을 보여줬다."],
    help:    ["도움을 청하는 건 용기가 필요했다.", "손을 내밀자 누군가 잡아주었다.", "혼자가 아니라는 사실이 달랐다."],
    solo:    ["혼자서 해결하기로 했다.", "누구에게도 기대지 않는 무게였다.", "독립적인 선택에는 대가가 따른다."],
    trust:   ["믿기로 했다. 그것은 도박이었다.", "신뢰는 가장 위험한 무기다.", "믿음을 선택한 순간이 전환점이 되었다."],
    retreat: ["한 걸음 물러섰다. 숨이 돌아왔다.", "물러서는 것도 전략이다.", "거리는 때로 명확함을 준다."],
};

function getReaction(mood) {
    const arr = BRANCH_REACTIONS[mood] || BRANCH_REACTIONS.bold;
    return arr[Math.floor(Math.random() * arr.length)];
}

// ── 핵심 파서 ──
function parseTextToNovel(rawText, title = "") {
    const lines = rawText
        .split('\n')
        .map(l => l.trim())
        .filter(l => l.length > 2);

    // 화자 감지
    const dialogueLines = lines.map(line => {
        let speaker = "서술";
        let text = line;
        const colonMatch = line.match(/^([^:：]{1,10})[：:]\s*(.+)$/);
        if (colonMatch) {
            speaker = colonMatch[1].trim();
            text = colonMatch[2].trim();
        } else if (line.startsWith('"') || line.startsWith('"') || line.startsWith("'")) {
            speaker = "???";
        }
        return { speaker, text };
    });

    // 화자 목록 추출 (상위 2개)
    const speakerCount = {};
    dialogueLines.forEach(l => {
        if (l.speaker !== "서술" && l.speaker !== "???") {
            speakerCount[l.speaker] = (speakerCount[l.speaker] || 0) + 1;
        }
    });
    const topSpeakers = Object.entries(speakerCount)
        .sort((a, b) => b[1] - a[1])
        .map(e => e[0]);
    const protagonist = topSpeakers[0] || "주인공";
    const heroine = topSpeakers[1] || "히로인";

    // 씬 분할: LINES_PER_SCENE 대사마다 분기
    const LINES_PER_SCENE = Math.max(3, Math.min(6, Math.floor(dialogueLines.length / 5)));
    const segments = [];
    for (let i = 0; i < dialogueLines.length; i += LINES_PER_SCENE) {
        segments.push(dialogueLines.slice(i, i + LINES_PER_SCENE));
    }

    // 배경 이미지 풀 (Pollinations 프리셋)
    const BG_PROMPTS = [
        "anime%20visual%20novel%20background%20luxury%20apartment%20night%20city%20view%20rain",
        "anime%20visual%20novel%20background%20dark%20office%20late%20night%20lamp",
        "anime%20visual%20novel%20background%20rooftop%20sunset%20sky",
        "anime%20visual%20novel%20background%20cafe%20rainy%20window%20bokeh",
        "anime%20visual%20novel%20background%20bedroom%20moonlight%20soft",
        "anime%20visual%20novel%20background%20hallway%20school%20empty%20dusk",
        "anime%20visual%20novel%20background%20park%20cherry%20blossom%20evening",
        "anime%20visual%20novel%20background%20bar%20neon%20lights%20night",
    ];
    const CHAR_PROMPTS = [
        "anime%20beautiful%20woman%20elegant%20long%20hair%20formal%20dress%20soft%20lighting",
        "anime%20beautiful%20woman%20short%20hair%20casual%20smile%20warm%20eyes",
        "anime%20beautiful%20woman%20long%20dark%20hair%20serious%20expression%20office%20suit",
        "anime%20beautiful%20woman%20gentle%20expression%20flowing%20hair%20romantic",
    ];

    const getBg = (idx) => `https://image.pollinations.ai/prompt/${BG_PROMPTS[idx % BG_PROMPTS.length]}?width=1280&height=720&nologo=true`;
    const getChar = (idx) => `https://image.pollinations.ai/prompt/${CHAR_PROMPTS[idx % CHAR_PROMPTS.length]}%20portrait%20full%20body?width=500&height=900&nologo=true`;

    // 씬 ID 생성
    const makeId = (seg, branch) => `scene_${seg}${branch ? '_' + branch : ''}`;

    // scenes 오브젝트 구성
    const scenes = {};
    const stageId = 'stage_' + Date.now();

    segments.forEach((seg, i) => {
        const isLast = i === segments.length - 1;
        const nextMain = isLast ? null : makeId(i + 1, '');
        const choiceBank = CHOICE_BANKS[i % CHOICE_BANKS.length];
        const sceneId = makeId(i, '');

        if (!isLast) {
            // ── 메인 씬 (선택지 포함) ──
            scenes[sceneId] = {
                bg: getBg(i),
                character: { name: heroine, charImage: getChar(i) },
                lines: seg,
                choices: [
                    { text: choiceBank[0].text, next: makeId(i, 'a'), mood: choiceBank[0].mood },
                    { text: choiceBank[1].text, next: makeId(i, 'b'), mood: choiceBank[1].mood },
                ]
            };

            // ── 분기 A ──
            scenes[makeId(i, 'a')] = {
                bg: getBg(i + 1),
                character: { name: heroine, charImage: getChar(i + 1) },
                lines: [
                    { speaker: "서술", text: getReaction(choiceBank[0].mood) },
                    { speaker: "서술", text: "그 선택이 다음 순간을 결정했다." }
                ],
                nextScene: nextMain
            };

            // ── 분기 B ──
            scenes[makeId(i, 'b')] = {
                bg: getBg(i + 2),
                character: { name: heroine, charImage: getChar(i + 2) },
                lines: [
                    { speaker: "서술", text: getReaction(choiceBank[1].mood) },
                    { speaker: "서술", text: "조용한 선택이었지만, 무언가 달라지기 시작했다." }
                ],
                nextScene: nextMain
            };
        } else {
            // ── 마지막 씬 (엔딩) ──
            scenes[sceneId] = {
                bg: getBg(i),
                character: { name: heroine, charImage: getChar(i) },
                lines: [
                    ...seg,
                    { speaker: "서술", text: "— End —" }
                ],
                endStage: true
            };
        }
    });

    const coverBg = getBg(0);
    const firstSceneId = makeId(0, '');

    const novel = {
        id: 'novel_' + Date.now(),
        meta: {
            title: title || `스토리 (${new Date().toLocaleTimeString()})`,
            coverBg,
            description: `총 ${segments.length}개의 장면, ${Object.keys(scenes).filter(k => k.includes('_a') || k.includes('_b')).length / 2}개의 분기점`,
            protagonist: { name: protagonist, pov: "PLAYER POV" },
        },
        stages: [{
            id: stageId,
            title: "제 1화",
            firstScene: firstSceneId,
            isUnlocked: true,
        }],
        scenes: { [stageId]: scenes },
        branchCount: segments.length - 1,
        sceneCount: segments.length,
    };

    return novel;
}

/* ──────────────────────────────────────────────
   메인 앱
────────────────────────────────────────────── */
const App = () => {
    const [screen, setScreen] = useState('LIBRARY');
    const [library, setLibrary] = useState([]);
    const [novel, setNovel] = useState(null);
    const [rawText, setRawText] = useState("");
    const [titleInput, setTitleInput] = useState("");

    // 플레이 상태
    const [stageId, setStageId] = useState(null);
    const [sceneId, setSceneId] = useState(null);
    const [lineIdx, setLineIdx] = useState(0);
    const [displayed, setDisplayed] = useState("");
    const [typing, setTyping] = useState(false);
    const [choiceHistory, setChoiceHistory] = useState([]);

    const typingRef = useRef(null);
    const boxRef = useRef(null);

    // 저장/불러오기
    useEffect(() => {
        try {
            const saved = localStorage.getItem('vn_library_v2');
            if (saved) setLibrary(JSON.parse(saved));
        } catch(e) {}
    }, []);
    useEffect(() => {
        try { localStorage.setItem('vn_library_v2', JSON.stringify(library)); } catch(e) {}
    }, [library]);

    // 파일 업로드
    const handleFile = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const ext = file.name.split('.').pop().toLowerCase();
        if (ext === 'txt') {
            const r = new FileReader();
            r.onload = ev => setRawText(ev.target.result);
            r.readAsText(file);
        } else if (ext === 'docx') {
            const r = new FileReader();
            r.onload = async ev => {
                const res = await mammoth.extractRawText({ arrayBuffer: ev.target.result });
                setRawText(res.value);
            };
            r.readAsArrayBuffer(file);
        } else if (ext === 'json') {
            const r = new FileReader();
            r.onload = ev => {
                try {
                    const data = JSON.parse(ev.target.result);
                    setLibrary(prev => [data, ...prev]);
                } catch(e) { alert("JSON 파싱 오류"); }
            };
            r.readAsText(file);
        }
        e.target.value = null;
    };

    // 게임 생성
    const handleGenerate = () => {
        if (!rawText.trim()) { alert("텍스트를 입력해주세요."); return; }
        const n = parseTextToNovel(rawText, titleInput.trim());
        setLibrary(prev => [n, ...prev]);
        setRawText("");
        setTitleInput("");
        playNovel(n);
    };

    const playNovel = (n) => {
        setNovel(n);
        const sid = n.stages[0].id;
        setStageId(sid);
        setSceneId(n.stages[0].firstScene);
        setLineIdx(0);
        setChoiceHistory([]);
        setScreen('PLAY');
    };

    const deleteNovel = (e, id) => {
        e.stopPropagation();
        if (confirm("삭제하시겠습니까?")) setLibrary(prev => prev.filter(n => n.id !== id));
    };

    // 씬 데이터
    const sceneData = (novel && stageId && sceneId)
        ? novel.scenes[stageId]?.[sceneId]
        : null;

    // 타이핑 효과
    useEffect(() => {
        if (screen !== 'PLAY' || !sceneData) return;
        const line = sceneData.lines[lineIdx];
        if (!line) return;
        setTyping(true);
        setDisplayed("");
        let i = 0;
        typingRef.current = setInterval(() => {
            if (i < line.text.length) {
                setDisplayed(line.text.substring(0, ++i));
            } else {
                clearInterval(typingRef.current);
                setTyping(false);
            }
        }, 22);
        return () => clearInterval(typingRef.current);
    }, [sceneId, lineIdx, screen]);

    const skipTyping = () => {
        clearInterval(typingRef.current);
        setDisplayed(sceneData.lines[lineIdx].text);
        setTyping(false);
    };

    const advance = () => {
        if (typing) { skipTyping(); return; }
        if (lineIdx < sceneData.lines.length - 1) {
            setLineIdx(l => l + 1);
        } else if (sceneData.nextScene) {
            setSceneId(sceneData.nextScene);
            setLineIdx(0);
        }
    };

    const pickChoice = (c) => {
        setChoiceHistory(prev => [...prev, { sceneId, choice: c.text, mood: c.mood }]);
        setSceneId(c.next);
        setLineIdx(0);
    };

    const isAtEnd = !typing && sceneData?.lines && lineIdx === sceneData.lines.length - 1;
    const showChoices = isAtEnd && sceneData?.choices;
    const showEnd = isAtEnd && sceneData?.endStage;
    const showNext = isAtEnd && sceneData?.nextScene;

    // 진행률 계산
    const progress = novel ? (() => {
        const mainScenes = novel.sceneCount || 1;
        const sceneNum = parseInt((sceneId || '').replace(/[^0-9]/g, '') || '0');
        return Math.min(100, Math.round((sceneNum / mainScenes) * 100));
    })() : 0;

    /* ── LIBRARY 화면 ── */
    if (screen === 'LIBRARY') return (
        <div className="fixed inset-0 bg-zinc-950 text-white overflow-y-auto vn-scrollbar">
            <div className="max-w-3xl mx-auto px-4 py-10 pb-20">

                {/* 헤더 */}
                <div className="mb-10">
                    <div className="flex items-center gap-3 mb-2">
                        <IcoBook size={28} cls="text-red-500"/>
                        <h1 className="text-3xl font-black tracking-widest uppercase serif text-shimmer">
                            Visual Novel
                        </h1>
                    </div>
                    <p className="text-zinc-500 text-sm ml-10">텍스트를 넣으면 자동으로 분기 게임이 됩니다</p>
                </div>

                {/* 변환기 */}
                <div className="bg-zinc-900 border border-zinc-800 rounded-2xl overflow-hidden mb-10 shadow-2xl">
                    <div className="flex items-center justify-between px-5 py-3 bg-zinc-800/80 border-b border-zinc-700">
                        <div className="flex items-center gap-2 text-sm font-bold text-emerald-400">
                            <IcoZap size={16}/> 자동 분기 생성기 (API 불필요)
                        </div>
                        <label className="flex items-center gap-1.5 text-xs text-zinc-400 hover:text-white cursor-pointer bg-zinc-700 hover:bg-zinc-600 px-3 py-1.5 rounded-lg transition-colors">
                            <input type="file" accept=".txt,.docx,.json" onChange={handleFile} className="hidden"/>
                            <IcoUpload size={13}/> 파일 불러오기
                        </label>
                    </div>

                    <div className="p-5">
                        <input
                            value={titleInput}
                            onChange={e => setTitleInput(e.target.value)}
                            placeholder="게임 제목 (선택사항)"
                            className="w-full bg-black/50 border border-zinc-700 focus:border-red-600 rounded-lg px-4 py-2.5 text-sm text-white outline-none mb-3 transition-colors"
                        />
                        <textarea
                            value={rawText}
                            onChange={e => setRawText(e.target.value)}
                            placeholder={"소설, 대화문, 시나리오 등 어떤 텍스트든 붙여넣으세요.\n\n엔진이 자동으로:\n  • 대화를 파싱하여 화자를 구분하고\n  • N줄마다 2개의 선택지를 삽입하며\n  • 선택에 따른 분기 씬을 생성합니다.\n\n예시)\n나루토: 오늘 좀 이상한 것 같아.\n히나타: 무슨 말이에요...?\n나루토: 그냥, 뭔가 달라진 것 같아서."}
                            className="w-full h-52 bg-black/50 border border-zinc-700 focus:border-red-600 rounded-lg p-4 text-sm text-zinc-300 outline-none vn-scrollbar resize-none transition-colors"
                        />

                        {rawText.trim() && (
                            <div className="mt-3 mb-3 flex gap-2 flex-wrap">
                                <span className="text-xs text-zinc-500 bg-zinc-800 px-2 py-1 rounded">
                                    {rawText.split('\n').filter(l=>l.trim()).length}줄
                                </span>
                                <span className="text-xs text-zinc-500 bg-zinc-800 px-2 py-1 rounded">
                                    예상 분기: {Math.max(0, Math.floor(rawText.split('\n').filter(l=>l.trim()).length / 5) - 1)}개
                                </span>
                                <span className="text-xs text-zinc-500 bg-zinc-800 px-2 py-1 rounded">
                                    예상 씬: {Math.max(1, Math.floor(rawText.split('\n').filter(l=>l.trim()).length / 5))}개
                                </span>
                            </div>
                        )}

                        <button
                            onClick={handleGenerate}
                            className="w-full py-3.5 bg-red-700 hover:bg-red-600 active:scale-[0.98] rounded-xl font-black tracking-widest uppercase text-sm flex items-center justify-center gap-2 transition-all shadow-lg mt-2"
                        >
                            <IcoZap size={18}/> 즉시 게임으로 변환
                        </button>
                    </div>
                </div>

                {/* 라이브러리 */}
                <h2 className="text-sm font-black uppercase tracking-widest text-zinc-500 mb-4 flex items-center gap-2">
                    <IcoBook size={14}/> 저장된 게임 ({library.length})
                </h2>

                {library.length === 0 ? (
                    <div className="text-center py-16 text-zinc-700 font-bold border-2 border-dashed border-zinc-800 rounded-2xl">
                        아직 생성된 게임이 없습니다
                    </div>
                ) : (
                    <div className="grid grid-cols-1 gap-4">
                        {library.map(n => (
                            <div key={n.id} onClick={() => playNovel(n)}
                                className="group relative bg-zinc-900 border border-zinc-800 hover:border-red-800 rounded-xl overflow-hidden cursor-pointer transition-all shadow-xl flex h-28">
                                <div className="w-28 h-full bg-cover bg-center shrink-0 opacity-70 group-hover:opacity-90 transition-opacity"
                                    style={{ backgroundImage: `url(${n.meta.coverBg})` }}/>
                                <div className="absolute left-0 top-0 h-full w-28 bg-gradient-to-r from-transparent to-zinc-900"/>
                                <div className="flex-1 px-4 py-3 flex flex-col justify-between">
                                    <div>
                                        <div className="flex items-center gap-2 mb-1">
                                            <span className="text-[9px] font-black uppercase tracking-widest text-red-500 bg-red-950/50 px-2 py-0.5 rounded-sm">
                                                {n.branchCount || 0}개 분기
                                            </span>
                                            <span className="text-[9px] font-black uppercase tracking-widest text-zinc-500">
                                                {n.sceneCount || 0}개 씬
                                            </span>
                                        </div>
                                        <h3 className="font-black text-base leading-tight">{n.meta.title}</h3>
                                        <p className="text-xs text-zinc-500 mt-0.5">{n.meta.description}</p>
                                    </div>
                                    <div className="flex items-center justify-between">
                                        <div className="flex items-center gap-1 text-xs text-red-500 font-bold">
                                            <IcoPlay size={12}/> 플레이
                                        </div>
                                        <button onClick={(e) => deleteNovel(e, n.id)}
                                            className="p-1.5 text-zinc-600 hover:text-red-500 transition-colors opacity-0 group-hover:opacity-100">
                                            <IcoTrash size={14}/>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>
                )}
            </div>
        </div>
    );

    /* ── PLAY 화면 ── */
    if (screen === 'PLAY' && sceneData) {
        const currentLine = sceneData.lines[lineIdx];
        const isBranchScene = sceneId?.includes('_a') || sceneId?.includes('_b');

        return (
            <div className="fixed inset-0 bg-black text-white overflow-hidden flex flex-col noise-bg">

                {/* 배경 */}
                <div className="absolute inset-0 z-0">
                    <div className="absolute inset-0 bg-cover bg-center transition-all duration-1000"
                        style={{ backgroundImage: `url(${sceneData.bg})`, filter: 'brightness(0.35) contrast(1.1)' }}/>
                    <div className="absolute inset-0 bg-gradient-to-b from-black/40 via-transparent to-black/80"/>
                </div>

                {/* 상단 HUD */}
                <div className="relative z-40 flex items-center justify-between px-4 pt-4 pb-2 shrink-0">
                    <button onClick={() => setScreen('LIBRARY')}
                        className="flex items-center gap-1.5 text-xs text-zinc-400 hover:text-white transition-colors bg-black/40 backdrop-blur-sm px-3 py-1.5 rounded-full border border-zinc-700/50">
                        <IcoBack size={12}/> 나가기
                    </button>

                    <div className="flex items-center gap-2">
                        {isBranchScene && (
                            <span className="branch-badge text-white px-2 py-1 rounded-full flex items-center gap-1 font-black">
                                <IcoShuffle size={10}/> BRANCH
                            </span>
                        )}
                        <div className="text-[10px] font-black uppercase tracking-widest text-zinc-400 bg-black/40 backdrop-blur-sm px-3 py-1.5 rounded-full border border-zinc-700/50">
                            {novel?.meta?.title}
                        </div>
                    </div>
                </div>

                {/* 진행 바 */}
                <div className="relative z-40 px-4 shrink-0">
                    <div className="h-0.5 bg-zinc-800 rounded-full overflow-hidden">
                        <div className="h-full bg-red-600 transition-all duration-700 ease-out"
                            style={{ width: `${progress}%` }}/>
                    </div>
                </div>

                {/* 캐릭터 */}
                <div className="relative z-10 flex-1 flex items-end justify-center pointer-events-none min-h-0">
                    {sceneData.character && (
                        <div key={sceneId} className="animate-fade-in-up w-full max-w-xs h-full flex items-end justify-center px-4">
                            <img
                                src={sceneData.character.charImage}
                                alt="character"
                                className="w-full max-h-full object-contain object-bottom drop-shadow-2xl opacity-90"
                                style={{ maxHeight: '65vh' }}
                            />
                        </div>
                    )}
                </div>

                {/* 하단 UI */}
                <div className="relative z-40 shrink-0 px-3 pb-4 pt-1 max-w-2xl mx-auto w-full">

                    {/* 선택지 */}
                    {showChoices && (
                        <div className="mb-3 animate-fade-in-up">
                            <div className="text-[10px] font-black uppercase tracking-widest text-zinc-500 mb-2 ml-1">
                                어떻게 하시겠습니까?
                            </div>
                            <div className="flex flex-col gap-2">
                                {sceneData.choices.map((c, i) => (
                                    <button key={i} onClick={() => pickChoice(c)}
                                        className="choice-btn w-full px-4 py-3.5 bg-black/80 backdrop-blur-md border border-zinc-700/60 text-left text-sm font-bold text-zinc-200 rounded-lg flex items-center justify-between">
                                        <span className="leading-snug">{c.text}</span>
                                        <IcoChevron size={16} cls="text-red-500 shrink-0 ml-2"/>
                                    </button>
                                ))}
                            </div>
                        </div>
                    )}

                    {/* 엔딩 */}
                    {showEnd && (
                        <div className="mb-3 animate-fade-in-up flex flex-col gap-2">
                            <div className="text-center text-zinc-500 text-xs font-bold uppercase tracking-widest mb-1">
                                선택 기록: {choiceHistory.length}개
                            </div>
                            <button onClick={() => playNovel(novel)}
                                className="w-full py-3.5 bg-red-700 hover:bg-red-600 rounded-xl font-black text-sm uppercase tracking-widest transition-colors">
                                처음부터 다시
                            </button>
                            <button onClick={() => setScreen('LIBRARY')}
                                className="w-full py-3 bg-zinc-800 hover:bg-zinc-700 rounded-xl font-black text-sm uppercase tracking-widest transition-colors text-zinc-300">
                                라이브러리로
                            </button>
                        </div>
                    )}

                    {/* 대화창 */}
                    <div className="dialog-box rounded-xl overflow-hidden">
                        {/* 화자 */}
                        <div className="px-4 pt-3 pb-0 flex items-center gap-2">
                            <div className="speaker-tag px-3 py-1">
                                <span className="text-xs font-black tracking-wide">
                                    {currentLine?.speaker || '서술'}
                                </span>
                            </div>
                            {typing && (
                                <div className="flex gap-0.5">
                                    {[0,1,2].map(i => (
                                        <div key={i} className="w-1 h-1 bg-red-500 rounded-full animate-bounce"
                                            style={{ animationDelay: `${i*0.15}s` }}/>
                                    ))}
                                </div>
                            )}
                        </div>

                        {/* 텍스트 */}
                        <div ref={boxRef} onClick={advance}
                            className="px-5 py-3.5 cursor-pointer min-h-[90px] vn-scrollbar overflow-y-auto">
                            <p className="text-[15px] leading-[1.85] text-zinc-100 font-medium break-keep serif">
                                {displayed}
                                {typing && <span className="cursor-blink text-red-500">█</span>}
                            </p>
                        </div>

                        {/* 하단 힌트 */}
                        <div className="px-5 pb-3 flex items-center justify-between">
                            <div className="text-[9px] text-zinc-600 uppercase tracking-widest">
                                {lineIdx + 1} / {sceneData.lines.length}
                            </div>
                            {!typing && !showChoices && !showEnd && (
                                <div className="flex items-center gap-1 text-[10px] text-zinc-500">
                                    탭하여 계속 <IcoChevron size={12} cls="text-red-600"/>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            </div>
        );
    }

    return <div className="fixed inset-0 bg-black flex items-center justify-center text-zinc-600">로딩 중...</div>;
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
