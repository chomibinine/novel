<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Visual Novel Engine Pro - Ultimate Edition</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.21/mammoth.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    
    <style>
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in-up { animation: fadeInUp 0.3s ease-out forwards; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .animate-spin-slow { animation: spin 2s linear infinite; }

        body { 
          margin: 0; background: #000; font-family: 'Pretendard', sans-serif; 
          overscroll-behavior: none; -webkit-touch-callout: none;
        }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #18181b; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #dc2626; border-radius: 4px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const IconChevronRight = ({size=24, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>;
        const IconRotateCcw = ({size=24, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><polyline points="3 3 3 8 8 8"/></svg>;
        const IconPlay = ({size=24, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>;
        const IconCpu = ({size=24, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="4" y="4" width="16" height="16" rx="2" ry="2"/><rect x="9" y="9" width="6" height="6"/><line x1="9" y1="1" x2="9" y2="4"/><line x1="15" y1="1" x2="15" y2="4"/><line x1="9" y1="20" x2="9" y2="23"/><line x1="15" y1="20" x2="15" y2="23"/><line x1="20" y1="9" x2="23" y2="9"/><line x1="20" y1="14" x2="23" y2="14"/><line x1="1" y1="9" x2="4" y2="9"/><line x1="1" y1="14" x2="4" y2="14"/></svg>;
        const IconUploadCloud = ({size=24, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/><polyline points="16 16 12 12 8 16"/></svg>;
        const IconScissors = ({size=24, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="6" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><line x1="20" y1="4" x2="8.12" y2="15.88"/><line x1="14.47" y1="14.48" x2="20" y2="20"/><line x1="8.12" y1="8.12" x2="12" y2="12"/></svg>;
        const IconDownload = ({size=24, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>;
        const IconTrash = ({size=24, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>;
        const IconLibrary = ({size=24, className=""}) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>;

        const App = () => {
          const [apiKey, setApiKey] = useState(localStorage.getItem('gemini_api_key_pro') || "");
          const [appState, setAppState] = useState('LIBRARY');
          const [novelLibrary, setNovelLibrary] = useState([]);
          const [currentNovel, setCurrentNovel] = useState(null);
          const [stats, setStats] = useState({});
          
          const [currentStageId, setCurrentStageId] = useState(null);
          const [currentSceneId, setCurrentSceneId] = useState(null);
          const [lineIndex, setLineIndex] = useState(0);
          const [displayedText, setDisplayedText] = useState("");
          const [isTyping, setIsTyping] = useState(false);
          
          const [rawText, setRawText] = useState("");
          const [isGenerating, setIsGenerating] = useState(false);
          const [errorMsg, setErrorMsg] = useState("");
          
          const [textChunks, setTextChunks] = useState([]);
          const [currentChunkIndex, setCurrentChunkIndex] = useState(0);
          const [appendTargetId, setAppendTargetId] = useState("NEW");

          useEffect(() => {
            const savedLib = localStorage.getItem('novel_library_pro');
            if (savedLib) setNovelLibrary(JSON.parse(savedLib));
          }, []);

          useEffect(() => {
            if (novelLibrary.length >= 0) localStorage.setItem('novel_library_pro', JSON.stringify(novelLibrary));
            localStorage.setItem('gemini_api_key_pro', apiKey);
          }, [novelLibrary, apiKey]);

          const chunkText = (text, maxLength = 2500) => {
            const paragraphs = text.split('\n');
            const chunks = [];
            let currentChunk = "";
            for(let p of paragraphs) {
              if(currentChunk.length + p.length > maxLength) {
                if(currentChunk.trim()) chunks.push(currentChunk.trim());
                currentChunk = p + '\n';
              } else { currentChunk += p + '\n'; }
            }
            if(currentChunk.trim()) chunks.push(currentChunk.trim());
            return chunks;
          };

          const processLoadedText = (fullText) => {
            const chunks = chunkText(fullText, 2500);
            if(chunks.length > 1) {
              setTextChunks(chunks);
              setCurrentChunkIndex(0);
              setRawText(chunks[0]);
              alert(`문서가 안전하게 ${chunks.length}개의 파트로 분할되었습니다.`);
            } else {
              setTextChunks([]);
              setCurrentChunkIndex(0);
              setRawText(fullText);
            }
          };

          const handleManualSplit = () => {
            if(!rawText.trim()) return alert("나눌 텍스트가 없습니다.");
            processLoadedText(rawText);
          };

          const handleFileUpload = (event) => {
            const file = event.target.files[0];
            if (!file) return;
            const ext = file.name.split('.').pop().toLowerCase();
            setIsGenerating(true);

            if (ext === 'json') {
              const reader = new FileReader();
              reader.onload = (e) => {
                try {
                  const data = JSON.parse(e.target.result);
                  setNovelLibrary(prev => [data, ...prev]);
                  alert("성공적으로 불러왔습니다.");
                } catch(err) { showError("JSON 파싱 에러"); }
                finally { setIsGenerating(false); }
              };
              reader.readAsText(file);
            } else if (ext === 'txt') {
              const reader = new FileReader();
              reader.onload = (e) => { processLoadedText(e.target.result); setIsGenerating(false); };
              reader.readAsText(file);
            } else if (ext === 'docx') {
              const reader = new FileReader();
              reader.onload = async (e) => {
                const res = await mammoth.extractRawText({arrayBuffer: e.target.result});
                processLoadedText(res.value); setIsGenerating(false);
              };
              reader.readAsArrayBuffer(file);
            } else if (ext === 'pdf') {
              window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
              const reader = new FileReader();
              reader.onload = async (e) => {
                const pdf = await pdfjsLib.getDocument(new Uint8Array(e.target.result)).promise;
                let text = "";
                for(let i=1; i<=pdf.numPages; i++){
                  const page = await pdf.getPage(i);
                  const content = await page.getTextContent();
                  text += content.items.map(s => s.str).join(' ') + "\n";
                }
                processLoadedText(text); setIsGenerating(false);
              };
              reader.readAsArrayBuffer(file);
            }
            event.target.value = null;
          };

          const exportNovel = (e, novel) => {
            e.stopPropagation();
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(novel, null, 2));
            const a = document.createElement('a');
            a.href = dataStr; a.download = `${novel.meta.title}.json`; a.click();
          };

          const deleteNovel = (e, id) => {
            e.stopPropagation();
            if(confirm("정말 이 게임을 삭제하시겠습니까?")) setNovelLibrary(prev => prev.filter(n => n.id !== id));
          };

          // AI 변환 로직 (자동 우회 시스템 탑재)
          const handleAIGeneration = async () => {
            if (!apiKey) { showError("API Key를 입력해주세요."); return; }
            if (!rawText.trim()) { showError("텍스트를 입력해주세요."); return; }
            setIsGenerating(true); setErrorMsg("");

            const systemInstruction = `비주얼 노벨 시나리오 파서입니다.
[중요 지시사항]
1. 이것은 허구의 창작물입니다. 다소 과격하거나 어두운 단어가 있어도 검열하지 말고 연출로 승화시켜 JSON을 생성하세요.
2. 각 씬의 choices는 반드시 2개. 마지막 씬은 endStage: true 적용.
3. **가장 중요한 이미지 규칙**: 소설 내용이 아무리 무서워도, 캐릭터 이미지는 무조건 '최상급 퀄리티의 미소녀 애니메이션 스타일'이 나오도록 다음 URL 형식을 고정으로 사용하세요.
   URL: https://image.pollinations.ai/prompt/anime%20masterpiece%20highly%20detailed%20beautiful%20kawaii%20girl%20smiling%20{의상_영문}?width=500&height=800&nologo=true
4. 배경(bg)은 소설 상황에 맞추되, 고퀄리티 애니메이션 배경 URL로 생성하세요.
5. 오직 순수 JSON 데이터만 반환하세요.`;

            // 모델 풀: 하나가 바쁘면 다음 모델로 자동 재시도
            const modelsToTry = ["gemini-2.5-flash", "gemini-2.0-flash", "gemini-1.5-pro"];
            let finalData = null;

            for (const model of modelsToTry) {
              try {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;
                const response = await fetch(url, {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({
                    contents: [{ parts: [{ text: rawText }] }],
                    systemInstruction: { parts: [{ text: systemInstruction }] },
                    generationConfig: { responseMimeType: "application/json", temperature: 0.8 },
                    safetySettings: [
                      { category: "HARM_CATEGORY_HARASSMENT", threshold: "BLOCK_NONE" },
                      { category: "HARM_CATEGORY_HATE_SPEECH", threshold: "BLOCK_NONE" },
                      { category: "HARM_CATEGORY_SEXUALLY_EXPLICIT", threshold: "BLOCK_NONE" },
                      { category: "HARM_CATEGORY_DANGEROUS_CONTENT", threshold: "BLOCK_NONE" }
                    ]
                  })
                });

                const data = await response.json();
                
                if (data.error) {
                  // High Demand 에러거나 503 에러면 다음 모델로 넘어감
                  if (data.error.message.toLowerCase().includes("high demand") || data.error.code === 503 || data.error.code === 404) {
                    console.warn(`${model} 서버 혼잡/오류. 다음 모델 시도 중...`);
                    continue; 
                  }
                  throw new Error(data.error.message);
                }
                
                if (!data.candidates || data.candidates[0].finishReason === "SAFETY") {
                  throw new Error("안전 필터에 의해 차단되었습니다. 민감한 단어를 조금 순화해주세요.");
                }

                finalData = data; // 성공하면 데이터 저장하고 루프 탈출
                break;
              } catch (err) {
                // Fetch 자체 네트워크 에러 등 처리
                if (err.message.toLowerCase().includes("high demand")) continue;
                throw err;
              }
            }

            try {
              if (!finalData) throw new Error("현재 구글 AI 서버 전체가 혼잡합니다. 1~2분 뒤에 다시 시도해주세요.");

              let jsonText = finalData.candidates[0].content.parts[0].text.trim().replace(/```json/g, '').replace(/```/g, '');
              const parsedNovel = JSON.parse(jsonText);
              
              let createdId = "";
              if (appendTargetId === "NEW") {
                parsedNovel.id = 'novel_' + Date.now();
                createdId = parsedNovel.id;
                setNovelLibrary(prev => [parsedNovel, ...prev]);
              } else {
                createdId = appendTargetId;
                setNovelLibrary(prev => {
                  const lib = [...prev];
                  const idx = lib.findIndex(n => n.id === appendTargetId);
                  if (idx !== -1) {
                    const target = JSON.parse(JSON.stringify(lib[idx]));
                    const newStageId = 'stage_' + Date.now();
                    const oldStageId = Object.keys(parsedNovel.scenes)[0];
                    
                    const newStage = { ...parsedNovel.stages[0], id: newStageId, isUnlocked: true };
                    target.stages.push(newStage);
                    target.scenes[newStageId] = parsedNovel.scenes[oldStageId];
                    lib[idx] = target;
                  }
                  return lib;
                });
              }

              setTimeout(() => {
                if (textChunks.length > 0 && currentChunkIndex < textChunks.length - 1) {
                  const nextIdx = currentChunkIndex + 1;
                  setCurrentChunkIndex(nextIdx);
                  setRawText(textChunks[nextIdx]);
                  setAppendTargetId(createdId); 
                  alert(`[파트 ${currentChunkIndex + 1}/${textChunks.length}] 변환 성공! 다음 파트가 자동으로 로드되었습니다.`);
                } else {
                  setRawText(""); setTextChunks([]); setCurrentChunkIndex(0);
                  alert("모든 파트의 변환이 완료되었습니다!");
                }
              }, 100);

            } catch (err) { showError("오류: " + err.message); }
            finally { setIsGenerating(false); }
          };

          const showError = (msg) => { setErrorMsg(msg); setTimeout(() => setErrorMsg(""), 6000); };

          const startStage = (novel, stageId) => {
            setCurrentNovel(novel); setCurrentStageId(stageId);
            const firstSceneId = novel.stages.find(s=>s.id===stageId).firstScene || Object.keys(novel.scenes[stageId])[0];
            setCurrentSceneId(firstSceneId); setLineIndex(0); setAppState('PLAY');
            const initialStats = {}; novel.meta.statsConfig?.forEach(sc => initialStats[sc.key] = 0);
            setStats(initialStats);
          };

          const sceneData = (currentNovel && currentStageId && currentSceneId) ? currentNovel.scenes[currentStageId][currentSceneId] : null;

          useEffect(() => {
            if (appState !== 'PLAY' || !sceneData) return;
            const line = sceneData.lines[lineIndex];
            if (!line) return;
            setIsTyping(true); setDisplayedText("");
            let i = 0;
            const timer = setInterval(() => {
              if (i < line.text.length) { setDisplayedText(line.text.substring(0, i+1)); i++; }
              else { clearInterval(timer); setIsTyping(false); }
            }, 30);
            return () => clearInterval(timer);
          }, [currentSceneId, lineIndex, appState]);

          const handleBoxClick = () => {
            if (isTyping) { setDisplayedText(sceneData.lines[lineIndex].text); setIsTyping(false); return; }
            if (lineIndex < sceneData.lines.length - 1) setLineIndex(lineIndex + 1);
            else if (sceneData.nextScene) { setCurrentSceneId(sceneData.nextScene); setLineIndex(0); }
          };

          const isActionPoint = !isTyping && lineIndex === (sceneData?.lines?.length - 1) && (sceneData?.choices || sceneData?.endStage);

          if (appState === 'LIBRARY') {
            return (
              <div className="fixed inset-0 w-full h-full bg-zinc-950 text-white overflow-y-auto custom-scrollbar">
                {errorMsg && <div className="fixed top-4 left-1/2 -translate-x-1/2 bg-red-600 px-6 py-4 rounded-lg z-50 font-bold shadow-2xl animate-fade-in-up text-center border border-white/20 min-w-[300px]">{errorMsg}</div>}
                
                <div className="max-w-5xl mx-auto py-10 px-6 pb-20">
                  <div className="flex flex-col md:flex-row justify-between md:items-center mb-8 gap-4">
                    <div className="flex items-center gap-3">
                      <IconLibrary size={32} className="text-red-600" />
                      <h1 className="text-3xl font-black uppercase tracking-widest text-red-600">AI Novel Engine <span className="text-white text-sm">PRO</span></h1>
                    </div>
                    <div className="flex bg-zinc-900 border border-zinc-700 p-2 rounded-lg">
                      <span className="text-xs font-bold text-zinc-500 ml-2 mt-1 uppercase mr-2">API KEY</span>
                      <input type="password" value={apiKey} onChange={(e)=>setApiKey(e.target.value)} className="bg-black border border-zinc-600 text-xs p-1.5 rounded outline-none focus:border-red-600 transition-all"/>
                    </div>
                  </div>

                  <div className="bg-zinc-900 border border-zinc-800 rounded-2xl shadow-2xl overflow-hidden mb-12">
                    <div className="bg-zinc-800 p-4 border-b border-zinc-700 flex flex-wrap items-center justify-between gap-3">
                      <div className="flex items-center gap-2 font-bold text-red-400 text-sm"><IconCpu size={18} /> AI 자동 분할 변환기</div>
                      <div className="flex gap-2">
                        <button onClick={handleManualSplit} className="flex items-center gap-1 text-xs text-zinc-300 hover:text-white bg-zinc-700 px-3 py-2 rounded-lg transition-colors"><IconScissors size={14} /> 수동 분할</button>
                        <label className="relative cursor-pointer flex items-center gap-1 text-xs text-zinc-300 hover:text-white bg-zinc-700 px-3 py-2 rounded-lg transition-colors">
                          <input type="file" accept=".txt,.json,.docx,.pdf" onChange={handleFileUpload} className="hidden" />
                          <IconUploadCloud size={14} /> 문서 가져오기
                        </label>
                      </div>
                    </div>
                    <div className="p-6">
                      {textChunks.length > 1 && (
                        <div className="mb-4 bg-red-900/30 border border-red-800 text-red-200 p-3 rounded-lg text-sm font-bold flex justify-between">
                          <span>[분할 진행] 안정적인 처리를 위해 나뉘어 변환됩니다.</span>
                          <span className="bg-red-700 text-white px-2 py-1 rounded">현재 파트 {currentChunkIndex + 1} / {textChunks.length}</span>
                        </div>
                      )}
                      <textarea value={rawText} onChange={(e)=>setRawText(e.target.value)} disabled={isGenerating || textChunks.length > 1} placeholder="이곳에 소설 내용을 입력하세요. PDF, DOCX 파일도 지원합니다." className="w-full h-48 bg-black border border-zinc-800 rounded-xl p-4 text-sm mb-4 outline-none focus:border-red-600 custom-scrollbar resize-none"/>
                      
                      <div className="flex flex-col md:flex-row gap-3">
                        <select value={appendTargetId} onChange={(e)=>setAppendTargetId(e.target.value)} disabled={textChunks.length > 1 && currentChunkIndex > 0} className="flex-1 bg-zinc-800 border border-zinc-700 text-sm font-bold p-3 rounded-xl outline-none focus:border-red-600 disabled:opacity-50">
                          <option value="NEW">✨ 새로운 게임으로 생성 (1화)</option>
                          {novelLibrary.map(n => <option key={n.id} value={n.id}>➕ {n.meta.title}에 누적 저장하기</option>)}
                        </select>
                        <button onClick={handleAIGeneration} disabled={isGenerating} className="px-8 py-3 bg-red-700 hover:bg-red-600 rounded-xl font-black text-sm flex items-center justify-center gap-2 disabled:bg-zinc-800 transition-all active:scale-95 shadow-lg">
                          {isGenerating ? <><IconCpu size={18} className="animate-spin-slow"/> 서버 우회 및 분석 중...</> : <><IconPlay size={18}/> 텍스트를 게임으로 변환</>}
                        </button>
                      </div>
                    </div>
                  </div>

                  <h2 className="text-xl font-black mb-6 tracking-widest text-white border-l-4 border-red-600 pl-3">MY NOVELS</h2>
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                    {novelLibrary.map(n => (
                      <div key={n.id} onClick={()=> {setCurrentNovel(n); setAppState('HUB');}} className="group relative h-64 bg-zinc-900 border border-zinc-800 rounded-2xl overflow-hidden cursor-pointer hover:border-red-600 transition-all shadow-xl">
                        <div className="absolute inset-0 bg-cover bg-center transition-transform duration-700 group-hover:scale-110" style={{backgroundImage: `url(${n.meta.coverBg})`, filter: 'brightness(0.5)'}}/>
                        <div className="absolute inset-0 bg-gradient-to-t from-black via-black/50 to-transparent"/>
                        
                        <div className="absolute top-4 right-4 flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                          <button onClick={(e)=>exportNovel(e, n)} className="p-2 bg-black/60 hover:bg-white hover:text-black text-white rounded-full transition-colors shadow-lg" title="다운로드"><IconDownload size={16}/></button>
                          <button onClick={(e)=>deleteNovel(e, n.id)} className="p-2 bg-black/60 hover:bg-red-600 text-white rounded-full transition-colors shadow-lg" title="삭제"><IconTrash size={16}/></button>
                        </div>

                        <div className="absolute bottom-0 left-0 p-6 w-full">
                          <span className="bg-red-700 text-white px-2 py-1 font-black text-[10px] uppercase tracking-widest mb-2 inline-block rounded-sm">총 {n.stages.length}화</span>
                          <h3 className="text-2xl font-black leading-tight mb-1">{n.meta.title}</h3>
                          <p className="text-xs text-zinc-400 line-clamp-1">{n.meta.description || '시나리오 정보'}</p>
                        </div>
                      </div>
                    ))}
                    {novelLibrary.length === 0 && <div className="col-span-full py-24 text-center text-zinc-600 font-bold border-2 border-dashed border-zinc-800 rounded-2xl">생성된 게임이 없습니다.</div>}
                  </div>
                </div>
              </div>
            );
          }

          if (appState === 'HUB') {
            return (
              <div className="fixed inset-0 w-full h-full bg-black text-white flex flex-col">
                <div className="absolute inset-0 bg-cover bg-center opacity-30 blur-sm" style={{backgroundImage: `url(${currentNovel.meta.coverBg})`}}/>
                <div className="relative z-10 p-6 flex justify-between items-center bg-black/40 backdrop-blur-md border-b border-white/10">
                   <button onClick={()=>setAppState('LIBRARY')} className="flex items-center gap-2 text-sm font-bold text-zinc-400 hover:text-white transition-colors group"><IconRotateCcw size={16} className="group-hover:-rotate-90 transition-all"/> 라이브러리</button>
                   <div className="font-black text-red-600 tracking-widest text-lg">{currentNovel.meta.title}</div>
                </div>
                <div className="relative z-10 flex-1 overflow-y-auto p-6 md:p-10 flex flex-col items-center custom-scrollbar">
                   <div className="w-full max-w-2xl space-y-4 pb-20">
                      <h2 className="text-3xl md:text-4xl font-black mb-10 text-center tracking-widest uppercase">Episodes</h2>
                      {currentNovel.stages.map(st => (
                        <button key={st.id} onClick={()=>startStage(currentNovel, st.id)} className="w-full p-6 bg-zinc-900/90 border-l-4 border-red-600 rounded-xl flex justify-between items-center hover:bg-zinc-800 transition-all shadow-2xl active:scale-[0.98]">
                           <div className="text-left">
                             <div className="text-xs text-zinc-500 font-bold uppercase tracking-widest mb-1">{st.charName || 'Target'}</div>
                             <div className="text-2xl font-black">{st.title}</div>
                           </div>
                           <IconPlay size={24} className="text-red-600"/>
                        </button>
                      ))}
                   </div>
                </div>
              </div>
            );
          }

          if (appState === 'PLAY') {
            return (
              <div className="fixed inset-0 w-full h-full bg-black text-white overflow-hidden select-none">
                <div className="absolute inset-0 bg-cover bg-center transition-all duration-1000 scale-105" style={{backgroundImage: `url(${sceneData.bg})`, filter: 'brightness(0.6)'}}/>
                
                <div className="absolute top-0 w-full p-6 flex justify-between items-start z-50 pointer-events-none">
                  <div className="bg-black/80 px-6 py-3 border-l-4 border-red-600 backdrop-blur-md shadow-2xl">
                    <div className="text-xs text-red-600 font-black uppercase tracking-widest">{currentNovel.meta.protagonist.pov}</div>
                    <div className="text-2xl font-black italic tracking-tight">{currentNovel.meta.protagonist.name}</div>
                  </div>
                </div>

                <div className="absolute inset-0 flex justify-center items-end pb-36 pointer-events-none">
                  {sceneData.character && (
                    <img src={sceneData.character.charImage} className="h-[90%] object-contain animate-fade-in-up drop-shadow-[0_0_50px_rgba(0,0,0,0.9)]" />
                  )}
                </div>

                <div className="absolute bottom-0 w-full p-4 md:p-8 max-w-6xl left-1/2 -translate-x-1/2 z-50">
                  {isActionPoint && (
                    <div className="grid gap-3 mb-6 animate-fade-in-up">
                      {sceneData.choices?.map((c, i) => (
                        <button key={i} onClick={()=>{
                           if(c.impact) {
                             const newStats = {...stats};
                             Object.keys(c.impact).forEach(k => { if(newStats[k] !== undefined) newStats[k] += c.impact[k]; });
                             setStats(newStats);
                           }
                           setCurrentSceneId(c.next); setLineIndex(0);
                        }} className="w-full p-5 bg-zinc-900/95 border border-white/10 hover:border-red-600 text-left rounded-xl font-bold transition-all flex justify-between items-center group shadow-2xl backdrop-blur-md active:scale-95">
                          <span className="text-sm md:text-lg">{c.text}</span> <IconChevronRight size={20} className="text-red-600 group-hover:translate-x-2 transition-all"/>
                        </button>
                      ))}
                      {sceneData.endStage && <button onClick={()=>setAppState('HUB')} className="w-full p-5 bg-red-700 hover:bg-red-600 font-black rounded-xl uppercase tracking-widest shadow-2xl active:scale-95">에피소드 완료 (허브로 돌아가기)</button>}
                    </div>
                  )}

                  <div onClick={handleBoxClick} className="w-full h-48 md:h-56 bg-zinc-950/90 border-2 border-white/10 p-8 relative cursor-pointer rounded-2xl backdrop-blur-md shadow-[0_0_50px_rgba(0,0,0,0.8)]">
                    <div className="absolute -top-5 left-8 px-8 py-1.5 bg-red-700 font-black skew-x-[-15deg] shadow-2xl border-r-4 border-white/30">
                      <span className="block skew-x-[15deg] text-lg md:text-xl tracking-wide">{sceneData.lines[lineIndex]?.speaker || '???'}</span>
                    </div>
                    <div className="text-lg md:text-2xl leading-[1.8] text-zinc-100 overflow-y-auto h-full custom-scrollbar font-medium break-keep">
                      {displayedText}
                    </div>
                    {!isTyping && !isActionPoint && <div className="absolute bottom-6 right-8 animate-bounce text-red-600"><IconChevronRight size={32}/></div>}
                  </div>
                </div>
              </div>
            );
          }
          return null;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
